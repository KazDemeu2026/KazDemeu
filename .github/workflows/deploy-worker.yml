name: Deploy Cloudflare Worker
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Publish Worker
        run: |
          npm install -g wrangler@2
          printf '%s' "$AUTH_USERS" | npx wrangler secret put AUTH_USERS --env production
          printf '%s' "$API_SECRET" | npx wrangler secret put API_SECRET --env production
          printf '%s' "$SUPABASE_URL" | npx wrangler secret put SUPABASE_URL --env production
          printf '%s' "$SUPABASE_SERVICE_ROLE_KEY" | npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY --env production
          npx wrangler publish --env production
        working-directory: worker
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          API_SECRET: ${{ secrets.API_SECRET }}
          AUTH_USERS: ${{ secrets.AUTH_USERS }}