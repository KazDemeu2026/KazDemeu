name: Deploy Cloudflare Worker

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Wrangler
        run: |
          npm install -g wrangler@2

      - name: Publish Worker`n        run: |`n          wrangler publish --env production`n        working-directory: worker`n        env:`n          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }} `n          SUPABASE_URL: ${{ secrets.SUPABASE_URL }} `n          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} `n          API_SECRET: ${{ secrets.API_SECRET }} `n          AUTH_USERS: ${{ secrets.AUTH_USERS }}`n