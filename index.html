<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>КазДемеу — Система управления договорами</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script>
window.APP_CONFIG = {
  apiBase: 'https://kd-grok.aliaskhat96.workers.dev'
};
</script>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap">
  <div class="lcard">
    <div class="llogo">
      <div class="li">🏭</div>
      <h1>КазДемеу</h1>
      <p>Система управления договорами</p>
    </div>
    <div class="rlist" id="rlist"></div>
    <button class="lbtn" id="lbtn" onclick="doLogin()" disabled>Войти</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="topbar">
    <div class="t-logo">🏭 КазДемеу</div>
    <div class="t-badge" id="tbadge"></div>
    <div class="t-right">
      <div class="zc">
        <button class="zb" onclick="zoom(-1)">−</button>
        <span class="zl" id="zlbl">100%</span>
        <button class="zb" onclick="zoom(1)">+</button>
        <button class="zb" onclick="zoom(0)">↺</button>
      </div>
      <button class="exp-btn" onclick="exportData()">💾 Экспорт</button>
      <label class="exp-btn"><input type="file" accept=".json,.xlsx,.xls,.csv" onchange="importData(event)" style="display:none">📂 Импорт</label>
      <span id="sbStatus" style="font-size:11px;color:#94a3b8"></span>
      <button class="tb purple" onclick="toggleGrok()">🤖 Claude AI</button>
      <button class="tb yellow" id="btnPassSettings" style="display:none" onclick="openPasswordSettings()">🔑 Пароли</button>
      <button class="tb" onclick="doLogout()">Выйти</button>
    </div>
  </div>
  <div id="app-inner" style="flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column">
    <div class="navtabs" id="navtabs" style="display:none"></div>
    <div class="main" id="main"></div>
  </div>
</div>

<!-- GROK PANEL -->
<div id="grokPanel">
  <div class="grok-header">
    <div class="grok-title">🤖 Claude AI <span style="font-size:11px;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);padding:2px 8px;border-radius:999px;font-weight:400;color:var(--accent2)">онлайн</span></div>
    <button class="grok-close" onclick="toggleGrok()">✕</button>
  </div>
  <div class="grok-messages" id="grokMessages">
    <div class="grok-msg ai">Привет! Я знаю все ваши договора. Спросите меня!</div>
  </div>
  <div class="grok-input-area">
    <div class="grok-quick">
      <button onclick="grokAsk('Сколько договоров и общая сумма?')">📊 Итоги</button>
      <button onclick="grokAsk('Какие договора не оплачены?')">❌ Дебиторка</button>
      <button onclick="grokAsk('Топ 5 дорогих договоров')">💰 Топ</button>
      <button onclick="grokAsk('Проанализируй финансы')">📈 Анализ</button>
      <button onclick="grokAsk('Какие риски есть?')">⚠️ Риски</button>
    </div>
    <div class="grok-input-row">
      <input type="text" class="grok-input" id="grokInput" placeholder="Спросите Claude AI..." onkeydown="if(event.key==='Enter')grokSend()">
      <button class="grok-send" id="grokSendBtn" onclick="grokSend()">Отправить</button>
    </div>
  </div>
</div>

<!-- SCROLL NAV -->
<div class="snav" id="snav" style="display:none">
  <button onclick="scrollTbl(-300)">▲</button>
  <button onclick="scrollTbl(300)">▼</button>
</div>

<script src="utils.js?v=3"></script>
<script src="supabase.js?v=3"></script>
<script src="auth.js?v=3"></script>
<script src="contracts.js?v=3"></script>
<script src="analytics.js?v=3"></script>
<script src="expenses.js?v=3"></script>
<script src="grok.js?v=3"></script>
<script src="app.js?v=3"></script>
</body>
</html>
