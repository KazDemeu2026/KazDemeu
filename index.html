<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>КазДемеу — Система управления договорами</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== КАЗDEMEU STYLES ===== */
:root {
  --bg: #f1f5f9;
  --bg2: #ffffff;
  --dark: #0f1923;
  --dark2: #1e293b;
  --accent: #1a56db;
  --accent2: #15803d;
  --danger: #dc2626;
  --warn: #d97706;
  --text: #111827;
  --text2: #6b7280;
  --border: #e5e7eb;
  --radius: 8px;
  --topbar-h: 48px;
  --navtab-h: 36px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--text); background: var(--bg); }

/* ===== LOGIN ===== */
#loginWrap {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, #0f1923, #1a2d45, #0f3460);
  display: flex; align-items: flex-start; justify-content: center;
  overflow-y: auto; padding: 24px;
}
.lcard {
  background: #fff; border-radius: 16px; padding: 32px;
  width: 100%; max-width: 400px; margin: auto;
  box-shadow: 0 24px 64px rgba(0,0,0,.4);
}
.llogo { text-align: center; margin-bottom: 24px; }
.llogo .li {
  width: 56px; height: 56px; background: var(--dark);
  border-radius: 14px; display: inline-flex; align-items: center;
  justify-content: center; font-size: 26px; margin-bottom: 10px;
}
.llogo h1 { font-size: 20px; font-weight: 700; }
.llogo p { color: var(--text2); font-size: 12px; margin-top: 3px; }
.rlist { display: flex; flex-direction: column; gap: 7px; margin-bottom: 18px; }
.ritem {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 13px; border: 2px solid var(--border);
  border-radius: var(--radius); cursor: pointer; transition: all .15s;
}
.ritem:hover, .ritem.on { border-color: var(--accent); background: #eff6ff; }
.rico {
  width: 34px; height: 34px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
}
.rinfo b { display: block; font-size: 13px; font-weight: 600; }
.rinfo span { font-size: 11px; color: var(--text2); }
.lbtn {
  width: 100%; padding: 11px; background: var(--accent);
  color: #fff; border: none; border-radius: var(--radius);
  font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
}
.lbtn:disabled { background: #9ca3af; cursor: not-allowed; }

/* ===== APP ===== */
#app { position: fixed; inset: 0; display: none; flex-direction: column; }

/* TOPBAR */
.topbar {
  height: var(--topbar-h); background: var(--dark); color: #fff;
  display: flex; align-items: center; padding: 0 14px; gap: 10px;
  flex-shrink: 0; z-index: 100;
}
.t-logo { font-size: 14px; font-weight: 700; white-space: nowrap; }
.t-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
.t-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }
.tb {
  padding: 4px 9px; border-radius: 5px; border: 1px solid rgba(255,255,255,.2);
  background: rgba(255,255,255,.08); color: #fff; cursor: pointer;
  font-size: 11px; font-family: inherit; white-space: nowrap;
}
.tb:hover { background: rgba(255,255,255,.16); }
.tb.green { background: rgba(21,128,61,.25); border-color: rgba(21,128,61,.4); color: #86efac; }
.tb.purple { background: rgba(99,102,241,.25); border-color: rgba(99,102,241,.5); color: #c4b5fd; }
.tb.yellow { background: rgba(251,191,36,.15); border-color: rgba(251,191,36,.3); color: #fbbf24; }
.zc { display: flex; align-items: center; gap: 3px; }
.zb {
  width: 20px; height: 20px; border-radius: 4px; border: 1px solid rgba(255,255,255,.2);
  background: rgba(255,255,255,.08); color: #fff; cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
}
.zl { font-size: 11px; color: #94a3b8; min-width: 30px; text-align: center; }

/* NAV TABS */
.navtabs {
  height: var(--navtab-h); background: var(--dark2);
  display: flex; align-items: center; padding: 0 14px; gap: 2px; flex-shrink: 0;
}
.ntab {
  padding: 5px 13px; border-radius: 6px; cursor: pointer;
  color: #94a3b8; font-size: 12px; font-weight: 500; transition: all .15s;
}
.ntab:hover { background: rgba(255,255,255,.08); color: #fff; }
.ntab.active { background: rgba(26,86,219,.3); color: #fff; }
.ntab.ext { color: #60a5fa; }

/* MAIN */
.main { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }

/* STATS */
.stats { display: flex; gap: 8px; padding: 8px 14px 6px; flex-shrink: 0; overflow-x: auto; }
.sc { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; min-width: 130px; flex-shrink: 0; }
.sl { font-size: 10px; color: var(--text2); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .04em; }
.sv { font-size: 18px; font-weight: 700; }
.ss { font-size: 10px; color: #9ca3af; margin-top: 1px; }

/* BANNER */
.banner { margin: 0 14px 6px; padding: 7px 12px; border-radius: 7px; font-size: 12px; display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
.b-blue { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }
.b-green { background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d; }
.b-purple { background: #f5f3ff; border: 1px solid #ddd6fe; color: #6d28d9; }
.b-teal { background: #f0fdfa; border: 1px solid #99f6e4; color: #0f766e; }
.b-orange { background: #fff7ed; border: 1px solid #fed7aa; color: #c2410c; }
.b-red { background: #fff1f2; border: 1px solid #fecdd3; color: #be123c; }

/* TOOLBAR */
.toolbar { display: flex; gap: 8px; padding: 0 14px 6px; flex-shrink: 0; flex-wrap: wrap; align-items: center; }
.sbox { flex: 1; min-width: 180px; position: relative; }
.sbox input { width: 100%; padding: 6px 11px 6px 28px; border: 1px solid var(--border); border-radius: 7px; font-size: 12px; font-family: inherit; background: var(--bg2); outline: none; }
.sbox input:focus { border-color: var(--accent); }
.si { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); font-size: 13px; color: #9ca3af; }
.fsel { padding: 6px 10px; border: 1px solid var(--border); border-radius: 7px; font-size: 12px; font-family: inherit; background: var(--bg2); outline: none; }
.btn { padding: 6px 13px; border-radius: 7px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-p { background: var(--accent); color: #fff; }
.btn-p:hover { background: #1d4ed8; }
.btn-g { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-g:hover { border-color: var(--accent); color: var(--accent); }

/* TABLE */
.twrap { flex: 1; overflow: hidden; margin: 0 14px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg2); display: flex; flex-direction: column; min-height: 0; }
.thead-bar { padding: 7px 12px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.th-title { font-size: 13px; font-weight: 600; }
.cnt { font-size: 11px; background: #f1f5f9; color: var(--text2); padding: 2px 8px; border-radius: 10px; }
.tscroll { flex: 1; overflow: auto; min-height: 0; }

/* SCROLLBAR */
.tscroll::-webkit-scrollbar, .fpage::-webkit-scrollbar, .apage::-webkit-scrollbar, #admScroll::-webkit-scrollbar { width: 8px; height: 8px; }
.tscroll::-webkit-scrollbar-track, .fpage::-webkit-scrollbar-track, .apage::-webkit-scrollbar-track, #admScroll::-webkit-scrollbar-track { background: #f0f4ff; border-radius: 4px; }
.tscroll::-webkit-scrollbar-thumb, .fpage::-webkit-scrollbar-thumb, .apage::-webkit-scrollbar-thumb, #admScroll::-webkit-scrollbar-thumb { background: #93c5fd; border-radius: 4px; }
.tscroll::-webkit-scrollbar-thumb:hover, .fpage::-webkit-scrollbar-thumb:hover, #admScroll::-webkit-scrollbar-thumb:hover { background: var(--accent); }
.tscroll, .fpage, .apage, #admScroll { scrollbar-width: thin; scrollbar-color: #93c5fd #f0f4ff; }

table { width: 100%; border-collapse: collapse; }
th {
  padding: 8px 11px; text-align: left; font-size: 10px; font-weight: 600;
  color: var(--text2); text-transform: uppercase; letter-spacing: .05em;
  background: #f9fafb; border-bottom: 1px solid var(--border);
  white-space: nowrap; position: sticky; top: 0; z-index: 4; cursor: grab; user-select: none;
  position: relative;
}
td { border-bottom: 1px solid #f3f4f6; vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f8faff; }
.td { padding: 9px 11px; line-height: 1.5; }

/* BADGES */
.bdg { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 11px; font-weight: 500; }
.bg { background: #dcfce7; color: #15803d; }
.br { background: #fee2e2; color: #991b1b; }
.by { background: #fef9c3; color: #854d0e; }
.bb { background: #dbeafe; color: #1e40af; }
.bfirm { background: #eff6ff; color: #1d4ed8; }
.bnew { background: #fce7f3; color: #be185d; }

/* STATUS */
.ssel { border: none; border-radius: 10px; font-size: 11px; font-weight: 600; padding: 3px 7px; cursor: pointer; outline: none; font-family: inherit; }
.sn { background: #f3f4f6; color: #6b7280; }
.ss2 { background: #fef9c3; color: #854d0e; }
.sp { background: #dbeafe; color: #1e40af; }
.sf { background: #dcfce7; color: #15803d; }

/* DRAG */
.dh { cursor: grab; color: #d1d5db; font-size: 14px; padding: 0 3px; }
.dh:hover { color: #9ca3af; }
tr.dragging { opacity: .4; }
tr.drag-over { outline: 2px solid var(--accent); }

/* COL RESIZE */
.rzr { position: absolute; right: 0; top: 0; width: 4px; height: 100%; cursor: col-resize; background: transparent; }
.rzr:hover { background: var(--accent); opacity: .3; }

/* EXPAND PANEL */
tr.xrow > td { border-bottom: none; }
.xpanel { background: #f8faff; border-bottom: 2px solid #dbeafe; }
.xinner { padding: 12px 14px 12px 44px; }
.xtitle { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }

/* COSTS */
.clist { display: flex; flex-direction: column; gap: 5px; margin-bottom: 8px; }
.crow { display: flex; align-items: center; gap: 8px; background: #fff; border: 1px solid #dbeafe; border-radius: 6px; padding: 7px 10px; }
.cnum { font-size: 11px; color: #9ca3af; min-width: 14px; }
.csum { font-size: 13px; font-weight: 700; color: var(--text); min-width: 110px; }
.ccom { font-size: 12px; flex: 1; }
.cdate { font-size: 10px; color: #9ca3af; }
.cdel { background: none; border: none; cursor: pointer; color: var(--danger); opacity: .5; font-size: 13px; }
.cdel:hover { opacity: 1; }
.ctot { display: flex; gap: 10px; align-items: center; padding: 7px 0 0; border-top: 1px solid #dbeafe; font-size: 12px; }
.acost { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; padding: 9px 11px; background: #fff; border: 1.5px dashed #bfdbfe; border-radius: 6px; }
.acrow { display: flex; gap: 7px; }
.acost input, .acost textarea { padding: 6px 9px; border: 1px solid #dbeafe; border-radius: 6px; font-size: 12px; font-family: inherit; outline: none; }
.acs { width: 120px; }
.acc { flex: 1; resize: none; height: 32px; }

/* FILES */
.flist { display: flex; flex-direction: column; gap: 5px; margin-bottom: 7px; }
.frow { display: flex; align-items: center; gap: 7px; background: #fff; border: 1px solid #dbeafe; border-radius: 6px; padding: 6px 9px; }
.fic { font-size: 16px; }
.fin { flex: 1; min-width: 0; }
.fnm { font-size: 12px; font-weight: 500; color: var(--accent); text-decoration: none; }
.fnm:hover { text-decoration: underline; }
.fmeta { font-size: 10px; color: #9ca3af; }
.fup { display: inline-flex; align-items: center; gap: 5px; padding: 6px 10px; background: #fff; border: 1.5px dashed #bfdbfe; border-radius: 6px; font-size: 12px; color: var(--accent); cursor: pointer; font-weight: 500; }
.fup:hover { background: #eff6ff; }

/* CONTRACT FORM */
.cform { background: #fff; border: 2px solid var(--accent); border-radius: var(--radius); padding: 14px; margin: 0 14px 8px; flex-shrink: 0; }
.cform-title { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
.fgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 7px; }
.ffield label { display: block; font-size: 10px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 2px; }
.ffield input, .ffield select { width: 100%; padding: 6px 9px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; font-family: inherit; outline: none; }
.ffield input:focus, .ffield select:focus { border-color: var(--accent); }
.factions { display: flex; gap: 7px; margin-top: 10px; }

/* ANALYTICS */
.apage { flex: 1; overflow: auto; padding: 10px 14px; }
.agrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; margin-top: 4px; }
.acard { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.actitle { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }
.brow { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
.blabel { font-size: 11px; color: var(--text2); width: 110px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.btrack { flex: 1; background: #f3f4f6; border-radius: 3px; height: 7px; }
.bfill { height: 100%; border-radius: 3px; background: var(--accent); }
.bval { font-size: 11px; font-weight: 600; min-width: 70px; text-align: right; }

/* FINANCE */
.fpage { flex: 1; overflow: auto; padding: 10px 14px; }
.ftable { width: 100%; border-collapse: collapse; background: var(--bg2); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
.ftable th { padding: 9px 12px; text-align: left; font-size: 10px; font-weight: 700; color: var(--text2); text-transform: uppercase; background: #f9fafb; border-bottom: 1px solid var(--border); }
.ftable td { padding: 9px 12px; border-bottom: 1px solid #f3f4f6; font-size: 12px; }
.ftable tr:last-child td { border-bottom: none; }
.pp { color: #15803d; font-weight: 700; }
.pn { color: #dc2626; font-weight: 700; }

/* ADM EXPENSES */
.adm-empty-cell:hover .adm-plus-btn { opacity: 1 !important; }
.adm-data-cell { position: relative; }
.adm-data-cell .adm-del-cell-btn { position: absolute; top: 2px; right: 2px; opacity: 0; background: #fee2e2; border: none; border-radius: 3px; padding: 1px 4px; color: var(--danger); cursor: pointer; font-size: 10px; transition: opacity .15s; z-index: 2; }
.adm-data-cell:hover .adm-del-cell-btn { opacity: 1; }
.adm-th-drag { cursor: grab; }
.adm-th-drag-over { border-left: 3px solid var(--accent) !important; }
.adm-col-resizer { position: absolute; right: 0; top: 0; width: 5px; height: 100%; cursor: col-resize; background: transparent; }
.adm-col-resizer:hover { background: rgba(255,255,255,.3); }
#admScroll { scrollbar-width: thin; scrollbar-color: #93c5fd #f0f4ff; }

/* GROK PANEL */
#grokPanel { position: fixed; right: 0; top: 0; bottom: 0; width: 420px; background: #fff; border-left: 2px solid var(--accent); display: none; flex-direction: column; z-index: 1000; box-shadow: -8px 0 30px rgba(0,0,0,.15); }
#grokPanel.open { display: flex; }
.grok-header { padding: 16px 20px; background: #0f172a; color: #fff; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.grok-title { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.grok-close { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 20px; padding: 0; }
.grok-close:hover { color: #fff; }
.grok-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; background: #f8fafc; }
.grok-msg { max-width: 85%; padding: 12px 16px; border-radius: 12px; font-size: 13.5px; line-height: 1.45; }
.grok-msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
.grok-msg.ai { align-self: flex-start; background: #f1f5f9; color: var(--text); border-bottom-left-radius: 4px; }
.grok-input-area { padding: 16px; border-top: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
.grok-quick { display: flex; flex-wrap: wrap; gap: 6px; }
.grok-quick button { padding: 5px 12px; background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 999px; font-size: 11px; cursor: pointer; color: #374151; font-family: inherit; }
.grok-quick button:hover { background: #eff6ff; border-color: #bfdbfe; color: var(--accent); }
.grok-input-row { display: flex; gap: 8px; }
.grok-input { flex: 1; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 13px; font-family: inherit; outline: none; }
.grok-input:focus { border-color: var(--accent); }
.grok-send { padding: 0 20px; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; }
.grok-send:hover { background: #1d4ed8; }
.grok-send:disabled { background: #9ca3af; cursor: not-allowed; }

/* SCROLL NAV BUTTONS */
.snav { position: fixed; right: 10px; bottom: 14px; display: flex; flex-direction: column; gap: 4px; z-index: 50; }
.snav button { width: 30px; height: 30px; background: var(--dark); border: none; color: #fff; border-radius: 50%; cursor: pointer; font-size: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.25); }
.snav button:hover { background: var(--accent); }

/* LOADING */
.loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: #9ca3af; gap: 10px; }
.spinner { width: 20px; height: 20px; border: 2px solid #e5e7eb; border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.nodata { text-align: center; padding: 40px; color: #9ca3af; }
.exp-btn { padding: 4px 9px; border-radius: 5px; border: 1px solid rgba(255,255,255,.2); background: rgba(255,255,255,.08); color: #fff; cursor: pointer; font-size: 11px; font-family: inherit; }

</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap">
  <div class="lcard">
    <div class="llogo">
      <div class="li">🏭</div>
      <h1>КазДемеу</h1>
      <p>Система управления договорами</p>
    </div>
    <div class="rlist" id="rlist"></div>
    <button class="lbtn" id="lbtn" onclick="doLogin()" disabled>Войти</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="t-logo">🏭 КазДемеу</div>
    <div class="t-badge" id="tbadge"></div>
    <div class="t-right">
      <div class="zc">
        <button class="zb" onclick="zoom(-1)">−</button>
        <span class="zl" id="zlbl">100%</span>
        <button class="zb" onclick="zoom(1)">+</button>
        <button class="zb" onclick="zoom(0)">↺</button>
      </div>
      <button class="exp-btn" onclick="exportData()">💾 Экспорт</button>
      <label class="exp-btn"><input type="file" accept=".json" onchange="importData(event)" style="display:none">📂 Импорт</label>
      <span id="sbStatus" style="font-size:11px;color:#94a3b8">⏳</span>
      <button class="tb purple" onclick="toggleGrok()">🤖 Claude AI</button>
      <button class="tb yellow" id="btnPassSettings" style="display:none" onclick="openPasswordSettings()">🔑 Пароли</button>
      <button class="tb" onclick="doLogout()">Выйти</button>
    </div>
  </div>
  <div id="app-inner" style="flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column">
    <div class="navtabs" id="navtabs" style="display:none"></div>
    <div class="main" id="main"></div>
  </div>
</div>

<!-- GROK PANEL -->
<div id="grokPanel">
  <div class="grok-header">
    <div class="grok-title">🤖 Claude AI <span style="font-size:11px;background:#334155;padding:2px 8px;border-radius:999px;font-weight:400">онлайн</span></div>
    <button class="grok-close" onclick="toggleGrok()">✕</button>
  </div>
  <div class="grok-messages" id="grokMessages">
    <div class="grok-msg ai">Привет! Я знаю все ваши договора и расходы. Спросите меня!</div>
  </div>
  <div class="grok-input-area">
    <div class="grok-quick">
      <button onclick="grokAsk('Сколько договоров и общая сумма?')">📊 Итоги</button>
      <button onclick="grokAsk('Какие договора не оплачены?')">❌ Дебиторка</button>
      <button onclick="grokAsk('Топ 5 дорогих договоров')">💰 Топ</button>
      <button onclick="grokAsk('Проанализируй финансы')">📈 Анализ</button>
      <button onclick="grokAsk('Какие риски есть?')">⚠️ Риски</button>

// Simple Supabase REST client
const supabase = {
  url: SUPABASE_URL,
  key: SUPABASE_KEY,

  async query(table, options = {}) {
    let url = `${this.url}/rest/v1/${table}`;
    const params = [];
    
    if (options.select) params.push(`select=${options.select}`);
    if (options.filter) {
      Object.entries(options.filter).forEach(([k, v]) => params.push(`${k}=eq.${v}`));
    }
    if (options.order) params.push(`order=${options.order}`);
    if (options.limit) params.push(`limit=${options.limit}`);
    
    if (params.length) url += '?' + params.join('&');

    const res = await fetch(url, {
      headers: {
        'apikey': this.key,
        'Authorization': `Bearer ${this.key}`,
        'Content-Type': 'application/json; charset=utf-8',
        'Accept': 'application/json',
        'Accept-Charset': 'utf-8',
        'Prefer': 'return=representation'
      }
    });
    
    if (!res.ok) throw new Error(`Supabase error: ${res.status}`);
    return res.json();
  },

  async insert(table, data) {
    const res = await fetch(`${this.url}/rest/v1/${table}`, {
      method: 'POST',
      headers: {
        'apikey': this.key,
        'Authorization': `Bearer ${this.key}`,
        'Content-Type': 'application/json; charset=utf-8',
        'Accept': 'application/json',
        'Accept-Charset': 'utf-8',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify(data)
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || 'Insert failed');
    }
    return res.json();
  },

  async update(table, id, data) {
    const res = await fetch(`${this.url}/rest/v1/${table}?id=eq.${id}`, {
      method: 'PATCH',
      headers: {
        'apikey': this.key,
        'Authorization': `Bearer ${this.key}`,
        'Content-Type': 'application/json; charset=utf-8',
        'Accept': 'application/json',
        'Accept-Charset': 'utf-8',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error('Update failed');
    return res.json();
  },

  async delete(table, id) {
    const res = await fetch(`${this.url}/rest/v1/${table}?id=eq.${id}`, {
      method: 'DELETE',
      headers: {
        'apikey': this.key,
        'Authorization': `Bearer ${this.key}`
      }
    });
    if (!res.ok) throw new Error('Delete failed');
    return true;
  },

  async upsert(table, data, onConflict = 'id') {
    const res = await fetch(`${this.url}/rest/v1/${table}?on_conflict=${onConflict}`, {
      method: 'POST',
      headers: {
        'apikey': this.key,
        'Authorization': `Bearer ${this.key}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation,resolution=merge-duplicates'
      },
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error('Upsert failed');
    return res.json();
  },

  // Realtime subscription via polling (simple approach)
  subscribe(table, callback, interval = 5000) {
    let lastCheck = new Date().toISOString();
    return setInterval(async () => {
      try {
        const data = await this.query(table, {
          filter: { 'updated_at': `gte.${lastCheck}` }
        });
        if (data.length > 0) {
          lastCheck = new Date().toISOString();
          callback(data);
        }
      } catch(e) {}
    }, interval);
  }
};

function rowFromForm() {

async function saveNew() {
  const data = rowFromForm();
  if (!data.org) { document.getElementById('nf-org').style.borderColor = 'red'; return; }
  try {
    const result = await supabase.insert('contracts', { ...data, sort_order: 0 });
    contracts.unshift(result[0]);
    showForm = false;
    renderContractsPage();
  } catch(e) { alert('Ошибка: ' + e.message); }
}

async function saveEdit() {
  const data = rowFromForm();
  try {
    const result = await supabase.update('contracts', editId, data);
    const idx = contracts.findIndex(x => x.id === editId);
    if (idx >= 0) contracts[idx] = { ...contracts[idx], ...result[0] };
    editId = null; showForm = false;
    renderContractsPage();
  } catch(e) { alert('Ошибка: ' + e.message); }
}

function cancelForm() { showForm = false; editId = null; renderContractsPage(); }
function startEdit(id) { editId = id; showForm = true; renderContractsPage(); }
function startAdd() { editId = null; showForm = true; renderContractsPage(); }

async function deleteRow(id) {
  if (!confirm('Удалить договор?')) return;
  try {
    await supabase.delete('contracts', id);
    contracts = contracts.filter(r => r.id !== id);
    renderContractsPage();
  } catch(e) { alert('Ошибка: ' + e.message); }
}

async function togglePay(id) {
  if (currentRole !== 'admin') return;
  const r = contracts.find(x => x.id === id);
  if (!r) return;
  const newStatus = r.payment_status === 'paid' ? 'unpaid' : 'paid';
  try {
    await supabase.update('contracts', id, { payment_status: newStatus });
    r.payment_status = newStatus;
    renderContractsPage();
  } catch(e) { alert('Ошибка: ' + e.message); }
}

async function toggleVisibility(id) {
  if (currentRole !== 'admin') return;
  const r = contracts.find(x => x.id === id);
  if (!r) return;
  const newVis = !r.is_visible;
  try {
    await supabase.update('contracts', id, { is_visible: newVis });
    r.is_visible = newVis;
    renderContractsPage();
  } catch(e) { alert('Ошибка: ' + e.message); }
}

// ===== DRAG ROWS =====
function onDS(e, id) {
  dragSrc = id;
  setTimeout(() => { const el = document.querySelector(`tr[data-id="${id}"]`); if (el) el.classList.add('dragging'); }, 0);
}
function onDE() { document.querySelectorAll('tr.dragging, tr.drag-over').forEach(el => el.classList.remove('dragging', 'drag-over')); }
function onDO(e, id) {
  e.preventDefault();
  document.querySelectorAll('tr.drag-over').forEach(el => el.classList.remove('drag-over'));
  const el = document.querySelector(`tr[data-id="${id}"]`);
  if (el && id !== dragSrc) el.classList.add('drag-over');
}
function onDrop(e, targetId) {
  e.preventDefault(); onDE();
  if (!dragSrc || dragSrc === targetId) return;
  const si = contracts.findIndex(r => r.id === dragSrc);
  const ti = contracts.findIndex(r => r.id === targetId);
  if (si < 0 || ti < 0) return;
  const [moved] = contracts.splice(si, 1);
  contracts.splice(ti, 0, moved);
  // Update sort orders in background
  contracts.forEach((r, i) => { r.sort_order = i; });
  renderContractsPage();
  // Save sort to Supabase
  Promise.all(contracts.map((r, i) => supabase.update('contracts', r.id, { sort_order: i }))).catch(console.error);
}

// ===== COLUMN RESIZE =====
function initResizers() {
  document.querySelectorAll('.tscroll th').forEach((th, i) => {
    if (th.querySelector('.rzr')) return;
    const k = currentRole + i;
    if (colWidths[k]) th.style.minWidth = colWidths[k] + 'px';
    const rz = document.createElement('div');
    rz.className = 'rzr';
    rz.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { th, k, sx: e.clientX, sw: th.getBoundingClientRect().width };
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    });
    th.appendChild(rz);
  });
}

document.addEventListener('mousemove', e => {
  if (!resizing) return;
  const w = Math.max(40, resizing.sw + (e.clientX - resizing.sx));
  resizing.th.style.minWidth = w + 'px';
});
document.addEventListener('mouseup', () => {
  if (!resizing) return;
  colWidths[resizing.k] = resizing.th.getBoundingClientRect().width;
  lsw('kd_colw', colWidths);
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  resizing = null;
});

let expenseCategories = [];
let expenseRecords = {};
let admDragSrcId = null;
let admResizing = null;
let admColWidths = JSON.parse(localStorage.getItem('kd_adm_cw') || '{}');

async function loadExpenses() {
  try {
    const [cats, records] = await Promise.all([
      supabase.query('expense_categories', { select: '*', order: 'sort_order.asc' }),
      supabase.query('expense_records', { select: '*', order: 'created_at.asc' })
    ]);
    expenseCategories = cats || [];
    expenseRecords = {};
    (records || []).forEach(r => {
      if (!expenseRecords[r.category_id]) expenseRecords[r.category_id] = [];
      expenseRecords[r.category_id].push(r);
    });
  } catch(e) { console.error('Load expenses error:', e); }
}

async function admAddCat() {
  const name = prompt('Название категории:');
  if (!name?.trim()) return;
  try {
    const result = await supabase.insert('expense_categories', {
      name: name.trim(),
      sort_order: expenseCategories.length
    });
    expenseCategories.push(result[0]);
    renderExpensesPage();
  } catch(e) { alert('Ошибка: ' + e.message); }
}

async function admDelCat(id) {
  if (!confirm('Удалить категорию и все записи?')) return;
  try {
    await supabase.delete('expense_categories', id);
    expenseCategories = expenseCategories.filter(c => c.id !== id);
    delete expenseRecords[id];
    renderExpensesPage();
  } catch(e) { alert('Ошибка: ' + e.message); }
}

async function admEditCat(id) {
  const cat = expenseCategories.find(c => c.id === id);
  if (!cat) return;
  const name = prompt('Новое название:', cat.name);
  if (!name?.trim()) return;
  try {
    await supabase.update('expense_categories', id, { name: name.trim() });
    cat.name = name.trim();
    renderExpensesPage();
  } catch(e) { alert('Ошибка: ' + e.message); }
}

async function admAddCell(catId) {
  const sEl = document.getElementById('adm-s-' + catId);
  const cEl = document.getElementById('adm-c-' + catId);
  const s = parseFloat((sEl?.value || '').replace(/\s/g, '').replace(',', '.'));
  const c = cEl?.value?.trim() || '';
  if (!s || s <= 0) { if (sEl) sEl.style.borderColor = 'red'; return; }
  try {
    const result = await supabase.insert('expense_records', {
      category_id: catId, amount: s, comment: c
    });
    if (!expenseRecords[catId]) expenseRecords[catId] = [];
    expenseRecords[catId].push(result[0]);
    if (sEl) sEl.value = '';
    if (cEl) cEl.value = '';
    renderExpensesPage();
  } catch(e) { alert('Ошибка: ' + e.message); }
}

function admShowInput(catId, btn) {
  const td = btn.closest('td');
  td.innerHTML = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:3px 4px">
    <input placeholder="Сумма" type="number" id="adm-s-${catId}" style="width:100%;padding:4px 6px;border:1px solid #bfdbfe;border-radius:4px;font-size:12px;font-family:inherit;outline:none;text-align:right" onkeydown="if(event.key==='Enter')admAddCell('${catId}')">
    <input placeholder="Комментарий" type="text" id="adm-c-${catId}" style="width:100%;padding:4px 6px;border:1px solid #bfdbfe;border-radius:4px;font-size:12px;font-family:inherit;outline:none" onkeydown="if(event.key==='Enter')admAddCell('${catId}')">
  </div>`;

}

async function admEditCell(catId, recordId, field) {
  const records = expenseRecords[catId] || [];
  const r = records.find(x => x.id === recordId);
  if (!r) return;
  const cur = field === 'amount' ? r.amount : r.comment;
  const val = prompt(field === 'amount' ? 'Новая сумма:' : 'Новый комментарий:', cur || '');
  if (val === null) return;
  const update = {};
  if (field === 'amount') {
    const n = parseFloat(val.replace(/\s/g, '').replace(',', '.'));
    if (!n || n <= 0) return;
    update.amount = n;
  } else {
    update.comment = val.trim();
  }
  try {
    await supabase.update('expense_records', recordId, update);
    Object.assign(r, update);
    renderExpensesPage();
  } catch(e) { alert('Ошибка: ' + e.message); }
}

async function admDelRow(catId, recordId) {
  try {
    await supabase.delete('expense_records', recordId);
    expenseRecords[catId] = (expenseRecords[catId] || []).filter(r => r.id !== recordId);
    renderExpensesPage();
  } catch(e) { alert('Ошибка: ' + e.message); }
}

// Column drag
function admColDragStart(e, catId) {
  admDragSrcId = catId;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.style.opacity = '.5';
}
function admColDragOver(e, catId) {
  e.preventDefault();
  document.querySelectorAll('.adm-th-drag').forEach(el => el.classList.remove('adm-th-drag-over'));
  if (catId !== admDragSrcId) e.currentTarget.classList.add('adm-th-drag-over');
}
async function admColDrop(e, targetId) {
  e.preventDefault();
  document.querySelectorAll('.adm-th-drag').forEach(el => el.classList.remove('adm-th-drag-over'));
  if (!admDragSrcId || admDragSrcId === targetId) return;
  const si = expenseCategories.findIndex(c => c.id === admDragSrcId);
  const ti = expenseCategories.findIndex(c => c.id === targetId);
  if (si < 0 || ti < 0) return;
  const [moved] = expenseCategories.splice(si, 1);
  expenseCategories.splice(ti, 0, moved);
  admDragSrcId = null;
  renderExpensesPage();
  // Save sort orders
  await Promise.all(expenseCategories.map((c, i) => supabase.update('expense_categories', c.id, { sort_order: i })));
}
function admColDragEnd() {
  admDragSrcId = null;
  document.querySelectorAll('.adm-th-drag').forEach(el => { el.style.opacity = ''; el.classList.remove('adm-th-drag-over'); });
}

// Column resize
function admResizerStart(e, catId) {
  e.preventDefault(); e.stopPropagation();
  const th = e.target.closest('th');
  admResizing = { catId, th, startX: e.clientX, startW: th.getBoundingClientRect().width };
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
}
document.addEventListener('mousemove', e => {
  if (!admResizing) return;
  const w = Math.max(140, admResizing.startW + (e.clientX - admResizing.startX));
  admResizing.th.style.minWidth = w + 'px';
});
document.addEventListener('mouseup', () => {
  if (!admResizing) return;
  admColWidths[admResizing.catId] = admResizing.th.getBoundingClientRect().width;
  localStorage.setItem('kd_adm_cw', JSON.stringify(admColWidths));
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  admResizing = null;
});

async function grokSend() {

async function grokAsk(question) {
  const msgs = document.getElementById('grokMessages');
  const btn = document.getElementById('grokSendBtn');

  // Add user message
  const uDiv = document.createElement('div');
  uDiv.className = 'grok-msg user';
  uDiv.textContent = question;
  msgs.appendChild(uDiv);

  // Loading
  const lDiv = document.createElement('div');
  lDiv.className = 'grok-msg ai';
  lDiv.id = 'grokLoading';
  lDiv.innerHTML = '<span style="color:#9ca3af;font-style:italic">⏳ Думаю...</span>';
  msgs.appendChild(lDiv);
  msgs.scrollTop = msgs.scrollHeight;
  btn.disabled = true;

  grokHistory.push({ role: 'user', content: question });

  try {
    const systemPrompt = 'Ты AI-ассистент системы КазДемеу. Отвечай кратко на русском языке.\n\n' + getDataContext();

    const resp = await fetch('https://corsproxy.io/?url=https://api.x.ai/v1/chat/completions', {
      method: 'POST',
      mode: 'cors',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + GROK_KEY
      },
      body: JSON.stringify({
        model: 'grok-3-mini',
        messages: [
          { role: 'system', content: systemPrompt },
          ...grokHistory.slice(-10)
        ],
        max_tokens: 1200,
        temperature: 0.7
      })
    });

    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    const answer = data.choices?.[0]?.message?.content || 'Нет ответа';
    grokHistory.push({ role: 'assistant', content: answer });

    const formatted = answer
      .split('\n').join('<br>')
      .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
      .replace(/\*(.*?)\*/g, '<i>$1</i>');

    lDiv.innerHTML = formatted;
  } catch(e) {
    lDiv.innerHTML = '<span style="color:#dc2626">❌ Ошибка подключения к Grok. Попробуйте снова.</span>';
console.error('Grok error:', e);
  }

  msgs.scrollTop = msgs.scrollHeight;
  btn.disabled = false;
}

// ===== ZOOM =====
function zoom(d) {
  if (d === 0) zoomLvl = 1;
  else if (d > 0) zoomLvl = Math.min(2, +(zoomLvl + 0.1).toFixed(1));
  else zoomLvl = Math.max(0.4, +(zoomLvl - 0.1).toFixed(1));
  applyZoom();
}
function applyZoom() {
  document.getElementById('app').style.zoom = zoomLvl;
  document.getElementById('zlbl').textContent = Math.round(zoomLvl * 100) + '%';
  lsw('kd_zoom', zoomLvl);
}
document.addEventListener('wheel', e => {
  if (!e.ctrlKey) return;
  e.preventDefault();
  zoom(e.deltaY < 0 ? 1 : -1);
}, { passive: false });

    constructor: ['b-purple', '🔧 Конструктор — цены скрыты'],
    technolog:   ['b-teal',   '⚙️ Технолог — цены скрыты'],
    logist:      ['b-orange', '🚚 Логист — цены скрыты'],
    goszakup:    ['b-red',    '📋 Госзакупщик']
  };
  const [bc, bt] = BNR[currentRole];

  m.innerHTML = `
    <div class="stats">
      <div class="sc"><div class="sl">Всего</div><div class="sv">${all.length}</div><div class="ss">показано: ${rows.length}</div></div>
      <div class="sc"><div class="sl">Оплачено</div><div class="sv" style="color:#15803d">${paid.length}</div></div>
      <div class="sc"><div class="sl">Не оплачено</div><div class="sv" style="color:#dc2626">${all.length - paid.length}</div></div>
      ${canPrice() ? `<div class="sc"><div class="sl">Общая сумма</div><div class="sv" style="font-size:13px">${fmtN(tot)}</div></div>` : ''}
    </div>
    <div class="banner ${bc}">${bt}</div>
    ${showForm ? formHtml(!!editId) : ''}
    <div class="toolbar">
      ${canManage() ? `<button class="btn btn-p" onclick="startAdd()">+ Добавить</button>` : ''}
      <div class="sbox"><span class="si">🔍</span><input id="sinp" placeholder="Поиск..." value="${searchQ}" oninput="onSearch(this.value)"></div>
      <select class="fsel" onchange="filterFirm=this.value;renderContractsPage()">
        <option value="">Все фирмы</option>
        ${firms().map(f => `<option value="${f}" ${filterFirm === f ? 'selected' : ''}>${f}</option>`).join('')}
      </select>
    </div>
    <div class="twrap">
      <div class="thead-bar">
        <span class="th-title">Договора</span>
        <span class="cnt">${rows.length} записей</span>
      </div>
      <div class="tscroll" id="tscroll"><div id="tbody"></div></div>
    </div>`;
  
  renderTable();
  requestAnimationFrame(initResizers);
}

function renderTable() {
  const rows = filtered();
  const mr = myRoleKey();
  const canDrag = canManage();
  
  const cols = [];
  if (canDrag) cols.push({ k: 'drag', l: '' });
  cols.push({ k: 'num', l: '№' });
  if (canCosts()) cols.push({ k: 'costs', l: 'Затраты' });
  if (currentRole === 'admin') cols.push({ k: 'stat', l: 'Статусы' });
  if (mr) cols.push({ k: 'mystat', l: 'Статус' });
  cols.push({ k: 'files', l: 'Файлы' });
  cols.push({ k: 'code', l: 'Номер закупки' });
  cols.push({ k: 'firm', l: 'Фирма' });
  cols.push({ k: 'org', l: 'Организация' });
  cols.push({ k: 'item', l: 'Предмет' });
  cols.push({ k: 'qty', l: 'Кол-во' });
  if (canPrice()) {
    cols.push({ k: 'price', l: 'Цена' });
    cols.push({ k: 'total', l: 'Сумма' });
  }
  if (currentRole === 'admin' || currentRole === 'manager') cols.push({ k: 'pay', l: 'Оплата' });
  cols.push({ k: 'loc', l: 'Место поставки' });
  cols.push({ k: 'dl', l: 'Срок' });
  cols.push({ k: 'con', l: '№ договора' });
  cols.push({ k: 'ph', l: 'Телефон' });
  cols.push({ k: 'sig', l: 'Подписан' });
  cols.push({ k: 'dev', l: 'Исполнение' });
  if (canManage()) cols.push({ k: 'act', l: 'Действия' });

  let h = `<table><thead><tr>${cols.map(c => `<th>${c.l}</th>`).join('')}</tr></thead><tbody>`;

  rows.forEach((r, i) => {
    const isNew = (new Date() - new Date(r.created_at)) < 86400000 * 3;
    const isEdit = editId === r.id;
    const exp = expandedRows.has(r.id);
    const cl = getCosts(r.id);
    const cs = cl.reduce((s, c) => s + Number(c.amount), 0);
    const fl = getFiles(r.id);
    const pay = r.payment_status === 'paid'
      ? '<span class="bdg bg">Оплачено</span>'
      : '<span class="bdg br">Не оплачено</span>';

    const tds = cols.map(c => {
      switch(c.k) {
        case 'drag':   return `<td><div class="td"><span class="dh" draggable="false">⠿</span></div></td>`;
        case 'num':    return `<td><div class="td" style="color:#9ca3af;font-weight:600">${i+1}</div></td>`;
        case 'costs':  return `<td><div class="td"><button class="btn btn-g" style="font-size:11px;padding:2px 7px" onclick="toggleExp('${r.id}')">${exp?'▾':'▸'} ${cl.length ? `💸${cl.length}·${fmtN(cs)}` : '+'}</button></div></td>`;
        case 'stat':   return `<td><div class="td" style="min-width:120px" data-src="${r.id}">${statusCellHtml(r.id)}</div></td>`;
        case 'mystat': return `<td><div class="td">${statusSel(r.id, mr)}</div></td>`;
        case 'files':  return `<td><div class="td" style="display:flex;align-items:center;gap:4px">
          ${fl.length ? `<button class="btn btn-g" style="font-size:11px;padding:2px 6px" onclick="toggleExp('${r.id}')">📎${fl.length}</button>` : ''}
          <button onclick="addFileLink('${r.id}')" title="Добавить файл" style="width:22px;height:22px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:5px;cursor:pointer;color:#1a56db;font-size:14px;font-weight:700;display:inline-flex;align-items:center;justify-content:center">+</button>
        </div></td>`;
        case 'code':   return `<td><div class="td" style="font-size:11px;font-family:monospace;max-width:150px">${r.code || '—'}${isNew ? '<span class="bdg bnew" style="margin-left:4px">new</span>' : ''}</div></td>`;
        case 'firm':   return `<td><div class="td"><span class="bdg bfirm">${r.firm || '—'}</span></div></td>`;
        case 'org':    return `<td><div class="td" style="max-width:170px;font-size:12px">${r.org || '—'}</div></td>`;
        case 'item':   return `<td><div class="td" style="max-width:190px">${r.item || '—'}</div></td>`;
        case 'qty':    return `<td><div class="td" style="font-weight:700;font-size:14px">${r.qty || '—'}</div></td>`;
        case 'price':  return `<td><div class="td" style="color:#1d4ed8;font-weight:600;white-space:nowrap">${r.price ? fmtN(r.price) : '—'}</div></td>`;
        case 'total':  return `<td><div class="td" style="font-weight:600;white-space:nowrap">${r.total ? fmtN(r.total) : '—'}</div></td>`;
        case 'pay':
          if (currentRole === 'admin')
            return `<td><div class="td"><button onclick="togglePay('${r.id}')" style="border:none;background:none;cursor:pointer;padding:0">${pay}</button></div></td>`;
          return `<td><div class="td">${pay}</div></td>`;
        case 'loc':    return `<td><div class="td" style="max-width:140px;font-size:11px">${r.location || '—'}</div></td>`;
        case 'dl':     return `<td><div class="td" style="max-width:150px;font-size:11px">${r.deadline || '—'}</div></td>`;
        case 'con':    return `<td><div class="td" style="font-size:11px;font-family:monospace">${r.contract_number || '—'}</div></td>`;
        case 'ph':     return `<td><div class="td" style="font-size:11px">${r.phone || '—'}</div></td>`;
        case 'sig':    return `<td><div class="td" style="font-size:11px">${r.signed_date || '—'}</div></td>`;
        case 'dev':    return `<td><div class="td" style="font-size:11px">${r.delivery_date || '—'}</div></td>`;
        case 'act':    return `<td><div class="td" style="display:flex;gap:3px;align-items:center">
          <button class="cdel" style="color:#1d4ed8;opacity:.7" onclick="startEdit('${r.id}')" title="Редактировать">✏️</button>
          <button class="cdel" onclick="deleteRow('${r.id}')" title="Удалить">🗑</button>
          <button onclick="toggleVisibility('${r.id}')" title="${r.is_visible ? 'Скрыть' : 'Показать'}" style="background:none;border:none;cursor:pointer;font-size:13px;opacity:.7">${r.is_visible ? '👁' : '🙈'}</button>
        </div></td>`;
        default: return '<td></td>';
      }
    }).join('');

    h += `<tr data-id="${r.id}" class="${exp ? 'xrow' : ''}" style="${isEdit ? 'outline:2px solid #1a56db;background:#eff6ff' : ''}"
      ${canDrag ? `draggable="true" ondragstart="onDS(event,'${r.id}')" ondragend="onDE()" ondragover="onDO(event,'${r.id}')" ondrop="onDrop(event,'${r.id}')"` : ''}>
      ${tds}</tr>`;

    if (exp) {
      h += `<tr><td colspan="${cols.length}" style="padding:0"><div class="xpanel"><div class="xinner">
        ${canCosts() ? costsHtml(r, currentRole === 'admin') : ''}
        ${filesHtml(r.id, true, canDelFile())}
      </div></div></td></tr>`;
    }
  });

  h += `</tbody></table>${!rows.length ? '<div class="nodata">🔍 Ничего не найдено</div>' : ''}`;
  const tb = document.getElementById('tbody');
  if (tb) tb.innerHTML = h;
  requestAnimationFrame(initResizers);
}

// ===== EXPORT/IMPORT =====
function exportData() {
  const data = {
    contracts,
    contractCosts,
    contractFiles,
    contractStatuses,
    exported: new Date().toLocaleString('ru-RU')
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `КазДемеу_${new Date().toLocaleDateString('ru-RU').replace(/\./g, '-')}.json`;
  a.click();
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      alert(`✅ Данные загружены!\nДоговоров: ${d.contracts?.length || 0}`);
      e.target.value = '';
    } catch { alert('❌ Неверный формат файла'); }
  };
  r.readAsText(file);
}
