<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>аземеу — Система управления договорами</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script>
window.APP_CONFIG = {
  apiBase: 'https://kazdemeu-worker.aliaskhat96.workers.dev'
};
</script>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap">
  <div class="lcard">
    <div class="llogo">
      <div class="li">🏭</div>
      <h1>аземеу</h1>
      <p>Система управления договорами</p>
    </div>
    <div class="rlist" id="rlist"></div>
    <button class="lbtn" id="lbtn" onclick="doLogin()" disabled>ойти</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="t-logo">🏭 аземеу</div>
    <div class="t-badge" id="tbadge"></div>
    <div class="t-right">
      <div class="zc">
        <button class="zb" onclick="zoom(-1)">−</button>
        <span class="zl" id="zlbl">100%</span>
        <button class="zb" onclick="zoom(1)">+</button>
        <button class="zb" onclick="zoom(0)">↺</button>
      </div>
      <button class="tb" onclick="exportData()">💾 кспорт</button>
      <label class="tb"><input type="file" accept=".json,.xlsx,.xls,.csv" onchange="importData(event)" style="display:none">📂 мпорт</label>
      <span id="sbStatus" style="font-size:11px;color:#94a3b8">⏳</span>
      <button class="tb purple" onclick="toggleGrok()">🤖 Grok AI</button>
      <button class="tb yellow" onclick="doLogout()">ыйти</button>
    </div>
  </div>
  <div id="app-inner" style="flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column">
    <div class="navtabs" id="navtabs"></div>
    <div class="main" id="main"></div>
  </div>
</div>

<!-- GROK PANEL -->
<div id="grokPanel">
  <div class="grok-header">
    <div class="grok-title">🤖 Grok AI <span style="font-size:11px;background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);padding:2px 8px;border-radius:999px;font-weight:400;font-family:Inter,sans-serif;color:var(--accent2)">онлайн</span></div>
    <button class="grok-close" onclick="toggleGrok()">✕</button>
  </div>
  <div class="grok-messages" id="grokMessages">
    <div class="grok-msg ai">ривет! Я готов анализировать ваши договоры.</div>
  </div>
  <div class="grok-input-area">
    <div class="grok-quick">
      <button onclick="grokAsk('Сколько договоров и общая сумма?')">📊 тоги</button>
      <button onclick="grokAsk('акие договора не оплачены?')">❌ ебиторка</button>
      <button onclick="grokAsk('Топ 5 дорогих договоров')">💰 Топ</button>
      <button onclick="grokAsk('роанализируй финансы')">📈 нализ</button>
      <button onclick="grokAsk('акие риски есть?')">⚠️ иски</button>
    </div>
    <div class="grok-input-row">
      <input type="text" class="grok-input" id="grokInput" placeholder="Спросите Grok..." onkeydown="if(event.key==='Enter')grokSend()">
      <button class="grok-send" id="grokSendBtn" onclick="grokSend()">тправить</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toastContainer"></div>

<script src="utils.js"></script>
<script src="supabase.js"></script>
<script src="auth.js"></script>
<script src="contracts.js"></script>
<script src="analytics.js"></script>
<script src="expenses.js"></script>
<script src="grok.js"></script>
<script src="app.js"></script>
</body>
</html>
