<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>КазДемеу — Система управления договорами</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== КАЗDEMEU HI-TECH STYLES ===== */
:root {
  --bg: #070f1d;
  --bg2: #0d1a2e;
  --bg3: #0a1628;
  --dark: #050d1a;
  --dark2: #0a1628;
  --accent: #00d4ff;
  --accent2: #00ff88;
  --danger: #ff4757;
  --warn: #ffa502;
  --text: #e2e8f0;
  --text2: #64748b;
  --border: rgba(0,212,255,0.15);
  --border2: rgba(0,212,255,0.3);
  --radius: 8px;
  --topbar-h: 48px;
  --navtab-h: 36px;
  --glow: 0 0 20px rgba(0,212,255,0.2);
  --glow-strong: 0 0 30px rgba(0,212,255,0.4);
  --glass: rgba(13,26,46,0.8);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; overflow: hidden;
  font-family: 'Inter', sans-serif; font-size: 13px;
  color: var(--text); background: var(--bg);
}

/* Circuit board grid background */
body {
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  background-color: var(--bg);
}

/* ===== LOGIN ===== */
#loginWrap {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, #050d1a, #070f1d, #0a1628);
  display: flex; align-items: flex-start; justify-content: center;
  overflow-y: auto; padding: 24px;
}
.lcard {
  background: rgba(13,26,46,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border2);
  border-radius: 16px; padding: 32px;
  width: 100%; max-width: 400px; margin: auto;
  box-shadow: 0 0 40px rgba(0,212,255,0.15), 0 24px 64px rgba(0,0,0,0.6);
}
.llogo { text-align: center; margin-bottom: 24px; }
.llogo .li {
  width: 56px; height: 56px;
  background: linear-gradient(135deg, #0a1628, #050d1a);
  border: 1px solid var(--border2);
  border-radius: 14px; display: inline-flex; align-items: center;
  justify-content: center; font-size: 26px; margin-bottom: 10px;
  box-shadow: var(--glow);
}
.llogo h1 {
  font-size: 20px; font-weight: 700;
  font-family: 'Orbitron', sans-serif;
  color: var(--accent); letter-spacing: 0.1em;
  text-shadow: 0 0 20px rgba(0,212,255,0.5);
}
.llogo p { color: var(--text2); font-size: 12px; margin-top: 3px; letter-spacing: 0.05em; }
.rlist { display: flex; flex-direction: column; gap: 7px; margin-bottom: 18px; }
.ritem {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 13px;
  border: 1px solid var(--border);
  background: rgba(7,15,29,0.6);
  border-radius: var(--radius); cursor: pointer;
  transition: all .2s ease;
}
.ritem:hover, .ritem.on {
  border-color: var(--accent);
  background: rgba(0,212,255,0.07);
  box-shadow: 0 0 12px rgba(0,212,255,0.15);
  transform: translateX(2px);
}
.ritem.on {
  border-left: 3px solid var(--accent);
}
.rico {
  width: 34px; height: 34px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; flex-shrink: 0;
  box-shadow: 0 0 8px rgba(0,0,0,0.4);
}
.rinfo b { display: block; font-size: 13px; font-weight: 600; color: var(--text); }
.rinfo span { font-size: 11px; color: var(--text2); }
.lbtn {
  width: 100%; padding: 11px;
  background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(0,212,255,0.05));
  color: var(--accent); border: 1px solid var(--border2);
  border-radius: var(--radius);
  font-size: 14px; font-weight: 600; cursor: pointer;
  font-family: 'Orbitron', sans-serif; letter-spacing: 0.1em;
  transition: all .2s ease;
}
.lbtn:hover {
  background: rgba(0,212,255,0.2);
  box-shadow: var(--glow);
}
.lbtn:disabled {
  background: rgba(100,116,139,0.1);
  border-color: rgba(100,116,139,0.2);
  color: var(--text2); cursor: not-allowed;
  box-shadow: none;
}

/* ===== APP ===== */
#app { position: fixed; inset: 0; display: none; flex-direction: column; }

/* TOPBAR */
.topbar {
  height: var(--topbar-h); background: var(--dark); color: #fff;
  display: flex; align-items: center; padding: 0 14px; gap: 10px;
  flex-shrink: 0; z-index: 100;
  border-bottom: 1px solid rgba(0,212,255,0.3);
  box-shadow: 0 2px 20px rgba(0,0,0,0.5);
}
.t-logo {
  font-size: 14px; font-weight: 700; white-space: nowrap;
  font-family: 'Orbitron', sans-serif;
  color: var(--accent); letter-spacing: 0.08em;
  text-shadow: 0 0 15px rgba(0,212,255,0.6);
}
.t-badge {
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
  font-weight: 500; letter-spacing: 0.04em;
}
.t-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }
.tb {
  padding: 4px 9px; border-radius: 5px;
  border: 1px solid rgba(0,212,255,0.2);
  background: rgba(0,212,255,0.05); color: var(--text); cursor: pointer;
  font-size: 11px; font-family: inherit; white-space: nowrap;
  transition: all .15s ease; letter-spacing: 0.03em;
}
.tb:hover {
  background: rgba(0,212,255,0.12);
  border-color: rgba(0,212,255,0.4);
  color: var(--accent);
  box-shadow: 0 0 8px rgba(0,212,255,0.2);
}
.tb.green {
  background: rgba(0,255,136,0.1);
  border-color: rgba(0,255,136,0.3);
  color: #00ff88;
}
.tb.purple {
  background: rgba(124,58,237,0.2);
  border-color: rgba(124,58,237,0.4);
  color: #c4b5fd;
}
.tb.yellow {
  background: rgba(255,165,2,0.1);
  border-color: rgba(255,165,2,0.3);
  color: #ffa502;
}
.zc { display: flex; align-items: center; gap: 3px; }
.zb {
  width: 20px; height: 20px; border-radius: 4px;
  border: 1px solid rgba(0,212,255,0.2);
  background: rgba(0,212,255,0.05); color: var(--text); cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s ease;
}
.zb:hover {
  background: rgba(0,212,255,0.15);
  border-color: var(--accent);
  color: var(--accent);
}
.zl { font-size: 11px; color: var(--text2); min-width: 30px; text-align: center; }

/* NAV TABS */
.navtabs {
  height: var(--navtab-h); background: var(--dark2);
  display: flex; align-items: center; padding: 0 14px; gap: 2px; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}
.ntab {
  padding: 5px 13px; border-radius: 6px; cursor: pointer;
  color: var(--text2); font-size: 12px; font-weight: 500;
  transition: all .15s ease; letter-spacing: 0.03em;
}
.ntab:hover {
  background: rgba(0,212,255,0.08);
  color: var(--text);
}
.ntab.active {
  background: rgba(0,212,255,0.12);
  color: var(--accent);
  border: 1px solid rgba(0,212,255,0.25);
  box-shadow: 0 0 10px rgba(0,212,255,0.15);
}
.ntab.ext { color: #60a5fa; }

/* MAIN */
.main { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }

/* STATS */
.stats { display: flex; gap: 8px; padding: 8px 14px 6px; flex-shrink: 0; overflow-x: auto; }
.sc {
  background: var(--glass);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 14px;
  min-width: 130px; flex-shrink: 0;
  transition: all .2s ease;
}
.sc:hover {
  border-color: var(--border2);
  box-shadow: var(--glow);
}
.sl {
  font-size: 10px; color: var(--text2); margin-bottom: 3px;
  text-transform: uppercase; letter-spacing: .08em;
}
.sv { font-size: 18px; font-weight: 700; color: var(--accent); }
.ss { font-size: 10px; color: var(--text2); margin-top: 1px; }

/* BANNER */
.banner {
  margin: 0 14px 6px; padding: 7px 12px; border-radius: 7px;
  font-size: 12px; display: flex; align-items: center; gap: 7px; flex-shrink: 0;
}
.b-blue {
  background: rgba(0,212,255,0.08);
  border: 1px solid rgba(0,212,255,0.25); color: var(--accent);
}
.b-green {
  background: rgba(0,255,136,0.08);
  border: 1px solid rgba(0,255,136,0.25); color: #00ff88;
}
.b-purple {
  background: rgba(124,58,237,0.1);
  border: 1px solid rgba(124,58,237,0.3); color: #c4b5fd;
}
.b-teal {
  background: rgba(0,212,255,0.06);
  border: 1px solid rgba(0,212,255,0.2); color: #5eead4;
}
.b-orange {
  background: rgba(255,165,2,0.08);
  border: 1px solid rgba(255,165,2,0.25); color: #ffa502;
}
.b-red {
  background: rgba(255,71,87,0.08);
  border: 1px solid rgba(255,71,87,0.25); color: #ff4757;
}

/* TOOLBAR */
.toolbar {
  display: flex; gap: 8px; padding: 0 14px 6px; flex-shrink: 0;
  flex-wrap: wrap; align-items: center;
}
.sbox { flex: 1; min-width: 180px; position: relative; }
.sbox input {
  width: 100%; padding: 6px 11px 6px 28px;
  border: 1px solid var(--border);
  border-radius: 7px; font-size: 12px; font-family: inherit;
  background: var(--bg3); color: var(--text); outline: none;
  transition: all .15s ease;
}
.sbox input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(0,212,255,0.1);
}
.sbox input::placeholder { color: var(--text2); }
.si { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--text2); }
.fsel {
  padding: 6px 10px; border: 1px solid var(--border); border-radius: 7px;
  font-size: 12px; font-family: inherit; background: var(--bg3);
  color: var(--text); outline: none; transition: all .15s ease;
}
.fsel:focus { border-color: var(--accent); }
.btn {
  padding: 6px 13px; border-radius: 7px; border: none;
  font-size: 12px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: all .15s ease; letter-spacing: 0.03em;
}
.btn-p {
  background: rgba(0,212,255,0.12);
  color: var(--accent);
  border: 1px solid rgba(0,212,255,0.3);
}
.btn-p:hover {
  background: rgba(0,212,255,0.22);
  box-shadow: 0 0 12px rgba(0,212,255,0.25);
}
.btn-g {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
}
.btn-g:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,212,255,0.05);
}

/* TABLE */
.twrap {
  flex: 1; overflow: hidden; margin: 0 14px 10px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: var(--bg2); display: flex; flex-direction: column; min-height: 0;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}
.thead-bar {
  padding: 7px 12px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  background: var(--bg3);
}
.th-title { font-size: 13px; font-weight: 600; color: var(--text); }
.cnt {
  font-size: 11px; background: rgba(0,212,255,0.1);
  color: var(--accent); padding: 2px 8px; border-radius: 10px;
  border: 1px solid rgba(0,212,255,0.2);
}
.tscroll { flex: 1; overflow: auto; min-height: 0; }

/* SCROLLBAR */
.tscroll::-webkit-scrollbar, .fpage::-webkit-scrollbar, .apage::-webkit-scrollbar, #admScroll::-webkit-scrollbar { width: 5px; height: 5px; }
.tscroll::-webkit-scrollbar-track, .fpage::-webkit-scrollbar-track, .apage::-webkit-scrollbar-track, #admScroll::-webkit-scrollbar-track { background: var(--bg3); border-radius: 3px; }
.tscroll::-webkit-scrollbar-thumb, .fpage::-webkit-scrollbar-thumb, .apage::-webkit-scrollbar-thumb, #admScroll::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.3); border-radius: 3px; }
.tscroll::-webkit-scrollbar-thumb:hover, .fpage::-webkit-scrollbar-thumb:hover, #admScroll::-webkit-scrollbar-thumb:hover { background: var(--accent); }
.tscroll, .fpage, .apage, #admScroll { scrollbar-width: thin; scrollbar-color: rgba(0,212,255,0.3) var(--bg3); }

table { width: 100%; border-collapse: collapse; }
th {
  padding: 8px 11px; text-align: left; font-size: 10px; font-weight: 600;
  color: var(--accent); text-transform: uppercase; letter-spacing: .08em;
  background: var(--bg3); border-bottom: 1px solid var(--border);
  white-space: nowrap; position: sticky; top: 0; z-index: 4; cursor: grab; user-select: none;
  position: relative;
}
td { border-bottom: 1px solid rgba(0,212,255,0.06); vertical-align: top; color: var(--text); }
tr:last-child td { border-bottom: none; }
tr:hover td {
  background: rgba(0,212,255,0.04);
}
.td { padding: 9px 11px; line-height: 1.5; }

/* BADGES */
.bdg { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 11px; font-weight: 500; }
.bg { background: rgba(0,255,136,0.12); color: #00ff88; border: 1px solid rgba(0,255,136,0.25); }
.br { background: rgba(255,71,87,0.12); color: #ff4757; border: 1px solid rgba(255,71,87,0.25); }
.by { background: rgba(255,165,2,0.12); color: #ffa502; border: 1px solid rgba(255,165,2,0.25); }
.bb { background: rgba(0,212,255,0.12); color: var(--accent); border: 1px solid rgba(0,212,255,0.25); }
.bfirm { background: rgba(0,212,255,0.08); color: var(--accent); border: 1px solid rgba(0,212,255,0.2); }
.bnew { background: rgba(236,72,153,0.12); color: #f472b6; border: 1px solid rgba(236,72,153,0.25); }

/* STATUS */
.ssel {
  border: 1px solid var(--border); border-radius: 10px;
  font-size: 11px; font-weight: 600; padding: 3px 7px;
  cursor: pointer; outline: none; font-family: inherit;
  background: var(--bg3); color: var(--text);
}
.sn { background: rgba(100,116,139,0.15); color: var(--text2); border-color: rgba(100,116,139,0.2); }
.ss2 { background: rgba(255,165,2,0.12); color: #ffa502; border-color: rgba(255,165,2,0.3); }
.sp { background: rgba(0,212,255,0.12); color: var(--accent); border-color: rgba(0,212,255,0.3); }
.sf { background: rgba(0,255,136,0.12); color: #00ff88; border-color: rgba(0,255,136,0.3); }

/* DRAG */
.dh { cursor: grab; color: var(--text2); font-size: 14px; padding: 0 3px; }
.dh:hover { color: var(--accent); }
tr.dragging { opacity: .4; }
tr.drag-over { outline: 2px solid var(--accent); box-shadow: 0 0 10px rgba(0,212,255,0.3); }

/* COL RESIZE */
.rzr { position: absolute; right: 0; top: 0; width: 4px; height: 100%; cursor: col-resize; background: transparent; }
.rzr:hover { background: var(--accent); opacity: .5; }

/* EXPAND PANEL */
tr.xrow > td { border-bottom: none; }
.xpanel {
  background: rgba(5,13,26,0.8);
  border-bottom: 2px solid rgba(0,212,255,0.2);
  border-left: 3px solid var(--accent);
}
.xinner { padding: 12px 14px 12px 44px; }
.xtitle {
  font-size: 10px; font-weight: 700; color: var(--accent);
  text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px;
}

/* COSTS */
.clist { display: flex; flex-direction: column; gap: 5px; margin-bottom: 8px; }
.crow {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 6px; padding: 7px 10px;
}
.cnum { font-size: 11px; color: var(--text2); min-width: 14px; }
.csum { font-size: 13px; font-weight: 700; color: var(--accent2); min-width: 110px; }
.ccom { font-size: 12px; flex: 1; color: var(--text); }
.cdate { font-size: 10px; color: var(--text2); }
.cdel { background: none; border: none; cursor: pointer; color: var(--danger); opacity: .5; font-size: 13px; }
.cdel:hover { opacity: 1; }
.ctot {
  display: flex; gap: 10px; align-items: center; padding: 7px 0 0;
  border-top: 1px solid var(--border); font-size: 12px; color: var(--text);
}
.acost {
  display: flex; flex-direction: column; gap: 6px; margin-top: 8px;
  padding: 9px 11px; background: var(--bg3);
  border: 1px dashed rgba(0,212,255,0.25); border-radius: 6px;
}
.acrow { display: flex; gap: 7px; }
.acost input, .acost textarea {
  padding: 6px 9px; border: 1px solid var(--border);
  border-radius: 6px; font-size: 12px; font-family: inherit; outline: none;
  background: var(--bg2); color: var(--text);
}
.acost input:focus, .acost textarea:focus { border-color: var(--accent); }
.acs { width: 120px; }
.acc { flex: 1; resize: none; height: 32px; }

/* FILES */
.flist { display: flex; flex-direction: column; gap: 5px; margin-bottom: 7px; }
.frow {
  display: flex; align-items: center; gap: 7px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 9px;
}
.fic { font-size: 16px; }
.fin { flex: 1; min-width: 0; }
.fnm { font-size: 12px; font-weight: 500; color: var(--accent); text-decoration: none; }
.fnm:hover { text-decoration: underline; text-shadow: 0 0 8px rgba(0,212,255,0.4); }
.fmeta { font-size: 10px; color: var(--text2); }
.fup {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 10px; background: var(--bg3);
  border: 1px dashed rgba(0,212,255,0.3); border-radius: 6px;
  font-size: 12px; color: var(--accent); cursor: pointer; font-weight: 500;
  transition: all .15s ease;
}
.fup:hover { background: rgba(0,212,255,0.08); border-color: var(--accent); }

/* CONTRACT FORM */
.cform {
  background: var(--glass); backdrop-filter: blur(12px);
  border: 1px solid var(--border2); border-radius: var(--radius);
  padding: 14px; margin: 0 14px 8px; flex-shrink: 0;
  box-shadow: var(--glow);
}
.cform-title { font-size: 13px; font-weight: 700; margin-bottom: 10px; color: var(--accent); }
.fgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 7px; }
.ffield label {
  display: block; font-size: 10px; color: var(--text2); font-weight: 600;
  text-transform: uppercase; letter-spacing: .06em; margin-bottom: 2px;
}
.ffield input, .ffield select {
  width: 100%; padding: 6px 9px; border: 1px solid var(--border);
  border-radius: 6px; font-size: 12px; font-family: inherit; outline: none;
  background: var(--bg3); color: var(--text);
}
.ffield input:focus, .ffield select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(0,212,255,0.1);
}
.factions { display: flex; gap: 7px; margin-top: 10px; }

/* ANALYTICS */
.apage { flex: 1; overflow: auto; padding: 10px 14px; }
.agrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; margin-top: 4px; }
.acard {
  background: var(--glass); backdrop-filter: blur(12px);
  border: 1px solid var(--border); border-radius: var(--radius); padding: 14px;
  transition: all .2s ease;
}
.acard:hover {
  border-color: var(--border2);
  box-shadow: var(--glow);
}
.actitle {
  font-size: 11px; font-weight: 700; color: var(--accent);
  text-transform: uppercase; letter-spacing: .07em; margin-bottom: 10px;
}
.brow { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
.blabel { font-size: 11px; color: var(--text2); width: 110px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.btrack { flex: 1; background: rgba(0,212,255,0.06); border-radius: 3px; height: 7px; }
.bfill { height: 100%; border-radius: 3px; background: var(--accent); }
.bval { font-size: 11px; font-weight: 600; min-width: 70px; text-align: right; color: var(--text); }

/* FINANCE */
.fpage { flex: 1; overflow: auto; padding: 10px 14px; }
.ftable {
  width: 100%; border-collapse: collapse;
  background: var(--bg2); border-radius: var(--radius);
  overflow: hidden; border: 1px solid var(--border);
}
.ftable th {
  padding: 9px 12px; text-align: left; font-size: 10px; font-weight: 700;
  color: var(--accent); text-transform: uppercase; background: var(--bg3);
  border-bottom: 1px solid var(--border); letter-spacing: .07em;
}
.ftable td { padding: 9px 12px; border-bottom: 1px solid rgba(0,212,255,0.06); font-size: 12px; color: var(--text); }
.ftable tr:last-child td { border-bottom: none; }
.ftable tr:hover td { background: rgba(0,212,255,0.04); }

// Simple Supabase REST client
const supabase = {
  url: SUPABASE_URL,
  key: SUPABASE_KEY,

  async query(table, options = {}) {
    let url = `${this.url}/rest/v1/${table}`;
    const params = [];
    
    if (options.select) params.push(`select=${options.select}`);
    if (options.filter) {
      Object.entries(options.filter).forEach(([k, v]) => params.push(`${k}=eq.${v}`));
    }
    if (options.order) params.push(`order=${options.order}`);
    if (options.limit) params.push(`limit=${options.limit}`);
    
    if (params.length) url += '?' + params.join('&');

    const res = await fetch(url, {
      headers: {
        'apikey': this.key,
        'Authorization': `Bearer ${this.key}`,
        'Content-Type': 'application/json; charset=utf-8',
        'Accept': 'application/json',
        'Accept-Charset': 'utf-8',
        'Prefer': 'return=representation'
      }
    });
    
    if (!res.ok) throw new Error(`Supabase error: ${res.status}`);

// ===== CRYPTO: SHA-256 PASSWORD HASHING =====
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// Hash all plain-text passwords in storage on first run (migration)
async function migratePasswords() {
  const stored = ls('kd_passwords', {});
  const hashed = ls('kd_pw_hashed', false);
  if (hashed) return; // already migrated
  const out = {};
  for (const [k, v] of Object.entries(stored)) {
    // if not already a 64-char hex hash, hash it
    out[k] = (v && /^[0-9a-f]{64}$/.test(v)) ? v : await sha256(v);

  // Also hash defaults for any missing key

  }
  lsw('kd_passwords', out);
  lsw('kd_pw_hashed', true);
  ROLE_PASSWORDS = out;
}

// ===== LOGIN RATE LIMITING =====
const MAX_ATTEMPTS = 5;
const LOCKOUT_MS = 5 * 60 * 1000; // 5 minutes

function getRateData(key) {
  return ls('kd_rate_' + key, { count: 0, lockedUntil: 0 });
}
function recordFailedAttempt(key) {
  const d = getRateData(key);
  d.count = (d.count || 0) + 1;
  d.lockedUntil = d.count >= MAX_ATTEMPTS ? Date.now() + LOCKOUT_MS : (d.lockedUntil || 0);
  lsw('kd_rate_' + key, d);
  return d;
}
function clearRate(key) { lsw('kd_rate_' + key, { count: 0, lockedUntil: 0 }); }
function isLocked(key) {
  const d = getRateData(key);
  if (d.lockedUntil && Date.now() < d.lockedUntil) return Math.ceil((d.lockedUntil - Date.now()) / 60000);
  return 0;
}

      const d = recordFailedAttempt(rateKey);
      const left = MAX_ATTEMPTS - d.count;
      showLoginError(left > 0 ? `❌ Неверный пароль. Осталось попыток: ${left}` : '🔒 Аккаунт заблокирован на 5 минут');
      return;
    }
    currentUserName = null;
    window._customUserKey = null;
    window._customUserName = null;
    window._customUserBaseRole = null;
    authenticated = true;
  }

  if (!authenticated) return;
  clearRate(rateKey);
  createSession(currentRole, currentUserName || ROLES[currentRole]?.l || currentRole);

  // Show app
  document.getElementById('loginWrap').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';

  const R = ROLES[currentRole];
  const displayName = currentUserName || R.l;
  document.getElementById('tbadge').textContent = displayName;
  document.getElementById('tbadge').style.cssText = BADGES[currentRole];
  document.getElementById('snav').style.display = 'flex';

  if (currentRole === 'admin') {
    document.getElementById('navtabs').style.display = 'flex';
    document.getElementById('btnPassSettings').style.display = 'inline-block';
  }

  // Session expiry warning
  setTimeout(() => {
    if (getSession()) showToast('⚠️ Сессия истекает через 30 минут');
  }, SESSION_TTL - 30 * 60 * 1000);
  setTimeout(() => {
    if (getSession()) { clearSession(); doLogout(); showLoginError('⏱️ Сессия истекла. Войдите снова.'); }
  }, SESSION_TTL);

  applyZoom();
  await loadAllData();
  startRealtimeSync();
  updateNavVisibility();
  goPage('contracts');
}

async function loadAllData() {
  showLoading();
  try {
    const [c, costs, files, statuses, cats, records] = await Promise.all([
      supabase.query('contracts', { select: '*', order: 'sort_order.asc,created_at.desc' }),
      supabase.query('contract_costs', { select: '*', order: 'created_at.asc' }),
      supabase.query('contract_files', { select: '*', order: 'created_at.asc' }),
      supabase.query('contract_statuses', { select: '*' }),
      supabase.query('expense_categories', { select: '*', order: 'sort_order.asc' }),
      supabase.query('expense_records', { select: '*', order: 'created_at.asc' })
    ]);

    contracts = c || [];

    // Load expense categories & records
    expenseCategories = cats || [];
    expenseRecords = {};
    (records || []).forEach(r => {
      if (!expenseRecords[r.category_id]) expenseRecords[r.category_id] = [];
      expenseRecords[r.category_id].push(r);
    });

    // Group costs by contract
    contractCosts = {};
    (costs || []).forEach(c => {
      if (!contractCosts[c.contract_id]) contractCosts[c.contract_id] = [];
      contractCosts[c.contract_id].push(c);
    });

    // Group files by contract
    contractFiles = {};
    (files || []).forEach(f => {
      if (!contractFiles[f.contract_id]) contractFiles[f.contract_id] = [];
      contractFiles[f.contract_id].push(f);
    });

    // Group statuses
    contractStatuses = {};
    (statuses || []).forEach(s => {
      if (!contractStatuses[s.contract_id]) contractStatuses[s.contract_id] = {};
      contractStatuses[s.contract_id][s.role] = s.status;
    });

    // Load comments (graceful - table may not exist)
    try {
      const commentsData = await supabase.query('contract_comments', { select: '*', order: 'created_at.asc' });
      contractComments = {};
      (commentsData || []).forEach(cm => {
        if (!contractComments[cm.contract_id]) contractComments[cm.contract_id] = [];
        contractComments[cm.contract_id].push(cm);
      });
    } catch(ce) {
      // Table may not exist yet, fall back to localStorage
      contractComments = ls('kd_comments', {});
    }

    hideLoading();
  } catch(e) {
    hideLoading();
    console.error('Load error:', e);
    showError('Ошибка загрузки данных: ' + e.message);
  }
}

        select: 'id,updated_at',
        order: 'updated_at.desc',

      });

        const m = document.getElementById('main');
        if (currentPage === 'contracts') renderContractsPage(m);
        else if (currentPage === 'expenses') renderExpensesPage(m);
        else if (currentPage === 'finance') renderFinancePage(m);
        else if (currentPage === 'analytics') renderAnalyticsPage(m);
        else if (currentPage === 'warehouse') renderWarehousePage(m);
        else if (currentPage === 'workshop') renderWorkshopPage(m);
      }
    } catch(e) {}
  }, 15000); // Check every 15 seconds
}

// ===== FILTER =====
function filtered() {
  return contracts.filter(r => {
    if (hiddenContracts.has(r.id) && currentRole !== 'admin') return false;
    if (!r.is_visible && currentRole !== 'admin') return false;
    // Per-role visibility: if set, only listed roles can see this row
    const allowedRoles = rowRoleVisibility[r.id];
    if (allowedRoles && allowedRoles.length > 0 && currentRole !== 'admin') {
      if (!allowedRoles.includes(currentRole)) return false;
    }
    const q = searchQ.toLowerCase();
    return (!q || (r.item||'').toLowerCase().includes(q) ||
            (r.org||'').toLowerCase().includes(q) ||
            (r.code||'').toLowerCase().includes(q) ||
            (r.contract_number||'').toLowerCase().includes(q)) &&
           (!filterFirm || r.firm === filterFirm);
  });
}

function firms() {
  return [...new Set(contracts.map(r => r.firm).filter(Boolean))];

const STATUS_OPTS = [
  { v: '', l: '— нет —', c: 'sn' },
  { v: 'start', l: '🟡 Старт', c: 'ss2' },
  { v: 'plan', l: '🔵 Плановая', c: 'sp' },
  { v: 'finish', l: '🟢 Финиш', c: 'sf' }
];

const getStatus = (id, role) => (contractStatuses[id] || {})[role] || '';
const getCls = v => STATUS_OPTS.find(o => o.v === v)?.c || 'sn';

async function setStatus(contractId, role, val) {
  if (!contractStatuses[contractId]) contractStatuses[contractId] = {};
  contractStatuses[contractId][role] = val;
  
  // Update UI immediately
  const sel = document.querySelector(`select[data-sid="${contractId}-${role}"]`);
  if (sel) { sel.value = val; sel.className = 'ssel ' + getCls(val); }
  const cell = document.querySelector(`div[data-src="${contractId}"]`);
  if (cell) cell.innerHTML = statusCellHtml(contractId);
  
  // Save to Supabase
  try {
    await supabase.upsert('contract_statuses', {
      contract_id: contractId,
      role: role,
      status: val
    }, 'contract_id,role');
  } catch(e) { console.error('Status save error:', e); }
}

function statusSel(id, role) {
  const cur = getStatus(id, role);
  return `<select data-sid="${id}-${role}" class="ssel ${getCls(cur)}" onchange="setStatus('${id}','${role}',this.value);this.className='ssel '+getCls(this.value)">
    ${STATUS_OPTS.map(o => `<option value="${o.v}"${cur === o.v ? ' selected' : ''}>${o.l}</option>`).join('')}
  </select>`;
}

const statusBadge = v => {
  const o = STATUS_OPTS.find(x => x.v === v);
  if (!o || !o.v) return '<span style="color:#9ca3af;font-size:11px">—</span>';
  const cls = v === 'start' ? 'by' : v === 'plan' ? 'bb' : 'bg';
  return `<span class="bdg ${cls}">${o.l}</span>`;
};

function statusCellHtml(id) {

async function addCost(contractId) {

  const s = parseFloat((sEl?.value || '').replace(/\s/g, '').replace(',', '.'));
  const c = (cEl?.value || '').trim();
  if (!s || s <= 0) { if (sEl) sEl.style.borderColor = 'red'; return; }
  
  try {
    const result = await supabase.insert('contract_costs', {
      contract_id: contractId,
      amount: s,
      comment: c
    });
    if (!contractCosts[contractId]) contractCosts[contractId] = [];
    contractCosts[contractId].push(result[0]);
    expandedRows.add(contractId);

  if (n.includes('.xls')) return '📊';

async function addFileLink(contractId) {

  try {

    contractFiles[contractId].push(result[0]);
    expandedRows.add(contractId);

async function saveComment(contractId) {
  const txt = (document.getElementById('cmttxt-' + contractId)?.value || '').trim();
  if (!txt) return;
  const author = currentUserName || (ROLES[currentRole] ? ROLES[currentRole].l : currentRole);
  const role = currentRole;
  const ts = Date.now();
  const newCmt = { text: txt, author, role, ts };

  if (!contractComments[contractId]) contractComments[contractId] = [];
  contractComments[contractId].push(newCmt);

  // Save to localStorage fallback
  const localAll = ls('kd_comments', {});
  if (!localAll[contractId]) localAll[contractId] = [];
  localAll[contractId].push(newCmt);
  lsw('kd_comments', localAll);

  // Try Supabase
  try {
    const result = await supabase.insert('contract_comments', { contract_id: contractId, text: txt, author, role });
    if (result && result[0]) {
      const idx = contractComments[contractId].indexOf(newCmt);
      if (idx >= 0) contractComments[contractId][idx] = result[0];
    }
  } catch(e) { /* graceful fallback */ }

  document.getElementById('cmtform-' + contractId)?.remove();
  // Refresh comment cell
  const cell = document.querySelector(`[data-cmtcell="${contractId}"]`);
  if (cell) cell.innerHTML = commentCellHtml(contractId);
}

// ===== DRAG ROWS =====
function onDS(e, id) {
  dragSrc = id;
  setTimeout(() => { const el = document.querySelector(`tr[data-id="${id}"]`); if (el) el.classList.add('dragging'); }, 0);
}
function onDE() { document.querySelectorAll('tr.dragging, tr.drag-over').forEach(el => el.classList.remove('dragging', 'drag-over')); }
function onDO(e, id) {
  e.preventDefault();
  document.querySelectorAll('tr.drag-over').forEach(el => el.classList.remove('drag-over'));
  const el = document.querySelector(`tr[data-id="${id}"]`);
  if (el && id !== dragSrc) el.classList.add('drag-over');
}
function onDrop(e, targetId) {
  e.preventDefault(); onDE();
  if (!dragSrc || dragSrc === targetId) return;
  const si = contracts.findIndex(r => r.id === dragSrc);
  const ti = contracts.findIndex(r => r.id === targetId);
  if (si < 0 || ti < 0) return;
  const [moved] = contracts.splice(si, 1);
  contracts.splice(ti, 0, moved);
  // Update sort orders in background
  contracts.forEach((r, i) => { r.sort_order = i; });
  renderContractsPage();
  // Save sort to Supabase
  Promise.all(contracts.map((r, i) => supabase.update('contracts', r.id, { sort_order: i }))).catch(console.error);
}

function initResizers() {
  document.querySelectorAll('.tscroll th').forEach((th, i) => {
    if (th.querySelector('.rzr')) return;
    const k = currentRole + i;
    if (colWidths[k]) th.style.minWidth = colWidths[k] + 'px';
    const rz = document.createElement('div');
    rz.className = 'rzr';
    rz.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      resizing = { th, k, sx: e.clientX, sw: th.getBoundingClientRect().width };
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    });
    th.appendChild(rz);
  });
}

document.addEventListener('mousemove', e => {
  if (!resizing) return;
  const w = Math.max(40, resizing.sw + (e.clientX - resizing.sx));
  resizing.th.style.minWidth = w + 'px';
});
document.addEventListener('mouseup', () => {
  if (!resizing) return;
  colWidths[resizing.k] = resizing.th.getBoundingClientRect().width;
  lsw('kd_colw', colWidths);
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  resizing = null;
});

// ===== АНАЛИТИКА =====
function renderAnalyticsPage(m) {
  if (!m) m = document.getElementById('main');
  const data = contracts;
  const paid = data.filter(r => r.payment_status === 'paid');
  const tot = data.reduce((s, r) => s + Number(r.total || 0), 0);
  const ptot = paid.reduce((s, r) => s + Number(r.total || 0), 0);
  const avg = data.length ? tot / data.length : 0;

  const byFirm = {}, byOrg = {}, byItem = {}, byRegion = {};
  data.forEach(r => {
    byFirm[r.firm || '—'] = (byFirm[r.firm || '—'] || 0) + Number(r.total || 0);
    byOrg[r.org || '—'] = (byOrg[r.org || '—'] || 0) + Number(r.total || 0);
    const qty = parseInt(r.qty) || 0;
    byItem[r.item || '—'] = (byItem[r.item || '—'] || 0) + qty;

    const loc = r.location || '';
    let region = 'Не указан';
    if (loc.includes('Астана')) region = 'Астана';
    else if (loc.includes('Алматы')) region = 'Алматы';
    else if (loc.includes('Костанай')) region = 'Костанайская обл.';
    else if (loc.includes('Павлодар')) region = 'Павлодарская обл.';
    else if (loc.includes('Уральск') || loc.includes('ЗКО')) region = 'ЗКО';
    else if (loc.includes('Атырау')) region = 'Атырау';
    else if (loc) region = 'Другие';
    byRegion[region] = (byRegion[region] || 0) + 1;
  });

  const fs = Object.entries(byFirm).sort((a, b) => b[1] - a[1]);
  const os = Object.entries(byOrg).sort((a, b) => b[1] - a[1]).slice(0, 8);
  const items = Object.entries(byItem).sort((a, b) => b[1] - a[1]).slice(0, 6);
  const regions = Object.entries(byRegion).sort((a, b) => b[1] - a[1]);
  const mf = fs[0]?.[1] || 1, mo = os[0]?.[1] || 1, mi = items[0]?.[1] || 1, mr2 = regions[0]?.[1] || 1;

  const sc = { start: 0, plan: 0, finish: 0, none: 0 };
  data.forEach(r => {
    const all_statuses = Object.values(contractStatuses[r.id] || {});
    const v = all_statuses.find(s => s) || '';
    if (v === 'start') sc.start++;
    else if (v === 'plan') sc.plan++;

    const ct = cl.reduce((s, c) => s + Number(c.amount), 0);
    return { ...r, ct, profit: Number(r.total || 0) - ct, hasCosts: cl.length > 0 };
  });
  const gt = rows.reduce((s, r) => s + Number(r.total || 0), 0);
  const gc = rows.reduce((s, r) => s + r.ct, 0);

// ===== АДМИНИСТРАТИВНЫЕ РАСХОДЫ =====

let expenseCategories = [];
let expenseRecords = {};
let admDragSrcId = null;
let admResizing = null;
let admColWidths = JSON.parse(localStorage.getItem('kd_adm_cw') || '{}');

async function loadExpenses() {
  try {
    const [cats, records] = await Promise.all([
      supabase.query('expense_categories', { select: '*', order: 'sort_order.asc' }),
      supabase.query('expense_records', { select: '*', order: 'created_at.asc' })
    ]);
    expenseCategories = cats || [];
    expenseRecords = {};
    (records || []).forEach(r => {
      if (!expenseRecords[r.category_id]) expenseRecords[r.category_id] = [];
      expenseRecords[r.category_id].push(r);
    });
  } catch(e) { console.error('Load expenses error:', e); }
}

async function admAddCat() {
  const name = prompt('Название категории:');
  if (!name?.trim()) return;
  try {
    const result = await supabase.insert('expense_categories', {
      name: name.trim(),
      sort_order: expenseCategories.length
    });
    expenseCategories.push(result[0]);
    renderExpensesPage();
  } catch(e) { alert('Ошибка: ' + e.message); }
}

async function admDelCat(id) {
  if (!confirm('Удалить категорию и все записи?')) return;
  try {
    await supabase.delete('expense_categories', id);
    expenseCategories = expenseCategories.filter(c => c.id !== id);
    delete expenseRecords[id];
    renderExpensesPage();
  } catch(e) { alert('Ошибка: ' + e.message); }
}

async function admEditCat(id) {
  const cat = expenseCategories.find(c => c.id === id);
  if (!cat) return;
  const name = prompt('Новое название:', cat.name);
  if (!name?.trim()) return;
  try {
    await supabase.update('expense_categories', id, { name: name.trim() });
    cat.name = name.trim();
    renderExpensesPage();
  } catch(e) { alert('Ошибка: ' + e.message); }
}

async function admAddCell(catId) {
  const sEl = document.getElementById('adm-s-' + catId);
  const cEl = document.getElementById('adm-c-' + catId);
  const s = parseFloat((sEl?.value || '').replace(/\s/g, '').replace(',', '.'));
  const c = cEl?.value?.trim() || '';
  if (!s || s <= 0) { if (sEl) sEl.style.borderColor = 'red'; return; }
  try {
    const result = await supabase.insert('expense_records', {
      category_id: catId, amount: s, comment: c
    });
    if (!expenseRecords[catId]) expenseRecords[catId] = [];
    expenseRecords[catId].push(result[0]);
    if (sEl) sEl.value = '';
    if (cEl) cEl.value = '';
    renderExpensesPage();
  } catch(e) { alert('Ошибка: ' + e.message); }
}

function admShowInput(catId, btn) {
  const td = btn.closest('td');
  td.innerHTML = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:3px 4px">
    <input placeholder="Сумма" type="number" id="adm-s-${catId}" style="width:100%;padding:4px 6px;border:1px solid rgba(0,212,255,0.3);border-radius:4px;font-size:12px;font-family:inherit;outline:none;text-align:right;background:#0a1628;color:#e2e8f0" onkeydown="if(event.key==='Enter')admAddCell('${catId}')">
    <input placeholder="Комментарий" type="text" id="adm-c-${catId}" style="width:100%;padding:4px 6px;border:1px solid rgba(0,212,255,0.3);border-radius:4px;font-size:12px;font-family:inherit;outline:none;background:#0a1628;color:#e2e8f0" onkeydown="if(event.key==='Enter')admAddCell('${catId}')">
  </div>`;
  document.getElementById('adm-s-' + catId)?.focus();
}

async function admEditCell(catId, recordId, field) {
  const records = expenseRecords[catId] || [];
  const r = records.find(x => x.id === recordId);
  if (!r) return;
  const cur = field === 'amount' ? r.amount : r.comment;
  const val = prompt(field === 'amount' ? 'Новая сумма:' : 'Новый комментарий:', cur || '');
  if (val === null) return;
  const update = {};
  if (field === 'amount') {
    const n = parseFloat(val.replace(/\s/g, '').replace(',', '.'));
    if (!n || n <= 0) return;
    update.amount = n;
  } else {
    update.comment = val.trim();
  }
  try {
    await supabase.update('expense_records', recordId, update);
    Object.assign(r, update);
    renderExpensesPage();
  } catch(e) { alert('Ошибка: ' + e.message); }
}

async function admDelRow(catId, recordId) {
  try {
    await supabase.delete('expense_records', recordId);
    expenseRecords[catId] = (expenseRecords[catId] || []).filter(r => r.id !== recordId);
    renderExpensesPage();
  } catch(e) { alert('Ошибка: ' + e.message); }
}

// Column drag
function admColDragStart(e, catId) {
  admDragSrcId = catId;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.style.opacity = '.5';
}
function admColDragOver(e, catId) {
  e.preventDefault();
  document.querySelectorAll('.adm-th-drag').forEach(el => el.classList.remove('adm-th-drag-over'));
  if (catId !== admDragSrcId) e.currentTarget.classList.add('adm-th-drag-over');
}
async function admColDrop(e, targetId) {
  e.preventDefault();
  document.querySelectorAll('.adm-th-drag').forEach(el => el.classList.remove('adm-th-drag-over'));
  if (!admDragSrcId || admDragSrcId === targetId) return;
  const si = expenseCategories.findIndex(c => c.id === admDragSrcId);
  const ti = expenseCategories.findIndex(c => c.id === targetId);
  if (si < 0 || ti < 0) return;
  const [moved] = expenseCategories.splice(si, 1);
  expenseCategories.splice(ti, 0, moved);
  admDragSrcId = null;
  renderExpensesPage();
  // Save sort orders
  await Promise.all(expenseCategories.map((c, i) => supabase.update('expense_categories', c.id, { sort_order: i })));
}
function admColDragEnd() {
  admDragSrcId = null;
  document.querySelectorAll('.adm-th-drag').forEach(el => { el.style.opacity = ''; el.classList.remove('adm-th-drag-over'); });
}

// Column resize
function admResizerStart(e, catId) {
  e.preventDefault(); e.stopPropagation();
  const th = e.target.closest('th');
  admResizing = { catId, th, startX: e.clientX, startW: th.getBoundingClientRect().width };
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
}
document.addEventListener('mousemove', e => {
  if (!admResizing) return;
  const w = Math.max(140, admResizing.startW + (e.clientX - admResizing.startX));
  admResizing.th.style.minWidth = w + 'px';
});
document.addEventListener('mouseup', () => {
  if (!admResizing) return;
  admColWidths[admResizing.catId] = admResizing.th.getBoundingClientRect().width;
  localStorage.setItem('kd_adm_cw', JSON.stringify(admColWidths));
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  admResizing = null;
});

async function grokSend() {
  const inp = document.getElementById('grokInput');
  const msg = inp.value.trim();
  if (!msg) return;
  inp.value = '';
  await grokAsk(msg);
}

async function grokAsk(msg) {
  const msgs = document.getElementById('grokMessages');
  const btn = document.getElementById('grokSendBtn');
  
  // Add user message
  msgs.innerHTML += `<div class="grok-msg user">${msg}</div>`;
  msgs.scrollTop = msgs.scrollHeight;
  
  btn.disabled = true;
  btn.textContent = '...';
  
  grokHistory.push({ role: 'user', content: msg });
  
  const systemPrompt = `Ты AI-ассистент системы КазДемеу — управление договорами. Отвечай кратко и по делу на русском языке.\n\n${getDataContext()}`;
  
  try {
    const res = await fetch('https://api.x.ai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${GROK_KEY}`
      },
      body: JSON.stringify({
        model: 'grok-3-mini',
        messages: [
          { role: 'system', content: systemPrompt },
          ...grokHistory.slice(-10)
        ],
        max_tokens: 500
      })
    });
    
    if (!res.ok) throw new Error('API error: ' + res.status);
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || 'Нет ответа';
    
    grokHistory.push({ role: 'assistant', content: reply });
    msgs.innerHTML += `<div class="grok-msg ai">${reply.replace(/\n/g, '<br>')}</div>`;
    msgs.scrollTop = msgs.scrollHeight;
  } catch(e) {
    msgs.innerHTML += `<div class="grok-msg ai" style="color:#ff4757">Ошибка: ${e.message}</div>`;
    msgs.scrollTop = msgs.scrollHeight;
  }
  
  btn.disabled = false;
  btn.textContent = 'Отправить';
}

  }
  lsw('kd_zoom', zoomLevel);

// ===== EXPORT / IMPORT =====
function exportData() {
  const data = {
    contracts,
    contractCosts,
    contractFiles,
    contractStatuses,
    expenseCategories,
    expenseRecords,
    exportedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `kazdemeu_export_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.contracts) contracts = data.contracts;
      if (data.contractCosts) contractCosts = data.contractCosts;
      if (data.contractFiles) contractFiles = data.contractFiles;
      if (data.contractStatuses) contractStatuses = data.contractStatuses;
      if (data.expenseCategories) expenseCategories = data.expenseCategories;
      if (data.expenseRecords) expenseRecords = data.expenseRecords;
      goPage(currentPage);
      alert('✅ Данные импортированы');
    } catch(err) {
      alert('❌ Ошибка импорта: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

let _colDragSrc = null;
function colDragStart(e, i) { _colDragSrc = i; e.dataTransfer.effectAllowed = 'move'; }
function colDragOver(e, i) { e.preventDefault(); }
function colDrop(e, i) {
  e.preventDefault();
  if (_colDragSrc === null || _colDragSrc === i) return;
  const cols = getColConfig();
  const [moved] = cols.splice(_colDragSrc, 1);
  cols.splice(i, 0, moved);
  colConfig = cols;
  _colDragSrc = null;
  openColSettings();
}
function updateColLabel(i, val) {
  const cols = getColConfig();
  if (cols[i]) cols[i].l = val;
  colConfig = cols;
}
function deleteCol(i) {
  const cols = getColConfig();
  if (cols[i] && !cols[i].locked) { cols.splice(i, 1); colConfig = cols; openColSettings(); }
}
function addNewCol() {
  const name = (document.getElementById('newColName')?.value || '').trim();
  if (!name) return;
  const cols = getColConfig();
  const newId = 'custom_' + Date.now();
  // Insert before actions
  const actIdx = cols.findIndex(c => c.id === 'actions');
  const insertAt = actIdx >= 0 ? actIdx : cols.length;
  cols.splice(insertAt, 0, { id: newId, l: name, w: 120, custom: true });
  colConfig = cols;
  openColSettings();
}
function applyColConfig() {
  const cols = getColConfig();
  lsw('kd_cols', cols);
  document.getElementById('colMgmtOverlay')?.remove();
  renderContractsPage();
  showToast('Конфигурация колонок сохранена');
}
function resetColConfig() {
  colConfig = null;

    <div class="sc"><div class="sl">Общая сумма</div><div class="sv" style="font-size:13px">${fmtN(totalSum)}</div></div>
    <div class="sc"><div class="sl">Оплачено</div><div class="sv" style="color:#00ff88;font-size:13px">${fmtN(paidSum)}</div><div class="ss">${paidCount} дог.</div></div>
    <div class="sc"><div class="sl">Дебиторка</div><div class="sv" style="color:#ffa502;font-size:13px">${fmtN(totalSum - paidSum)}</div></div>
    ` : ''}
  </div>`;

  // Form
  if (showForm) {
    html += formHtml(editId !== null);
  }

  // Toolbar
  html += `<div class="toolbar">
    <div class="sbox">
      <span class="si">🔍</span>
      <input id="sinp" type="text" placeholder="Поиск по организации, предмету, номеру..." value="${searchQ}" oninput="onSearch(this.value)">
    </div>
    <select class="fsel" onchange="filterFirm=this.value;renderContractsPage()">
      <option value="">Все фирмы</option>
      ${firmList.map(f => `<option value="${f}"${filterFirm === f ? ' selected' : ''}>${f}</option>`).join('')}
    </select>
    ${canAdd ? `<button class="btn btn-p" onclick="startAdd()">+ Добавить</button>` : ''}
    ${isAdmin ? `<button class="btn btn-g" onclick="renderContractsPage()">🔄 Обновить</button>` : ''}
    ${isAdmin ? `<button class="btn btn-g" onclick="openColSettings()">⚙️ Колонки</button>` : ''}
  </div>`;

  // Table wrapper
  html += `<div class="twrap">
    <div class="thead-bar">
      <span class="th-title">Договора</span>
      <span class="cnt">${rows.length}</span>
    </div>
    <div class="tscroll" id="tscroll">`;

  html += buildTable(rows, isAdmin, canAdd, canDel, canSeePrice);

  html += `</div></div>`;

  m.innerHTML = html;
  initResizers();
}

function renderTable() {
  const sc = document.getElementById('tscroll');
  if (!sc) { renderContractsPage(); return; }
  const rows = filtered();
  const isAdmin = currentRole === 'admin';
  const canAdd = isAdmin || currentRole === 'goszakup';
  const canDel = isAdmin || currentRole === 'goszakup';
  sc.innerHTML = buildTable(rows, isAdmin, canAdd, canDel, canPrice());
  initResizers();
  // Update count
  const cnt = document.querySelector('.cnt');
  if (cnt) cnt.textContent = rows.length;
}

function buildTable(rows, isAdmin, canAdd, canDel, canSeePrice) {
  const roleKey = myRoleKey();

  // Build column list based on config + role permissions
  // Always use the legacy column set for non-admin for simplicity; admin uses config
  let cols;
  if (isAdmin) {
    cols = getColConfig().map(c => ({ ...c }));
    // Filter price columns if not admin (should always be admin here but safety)
    if (!canSeePrice) cols = cols.filter(c => c.id !== 'price' && c.id !== 'total' && c.id !== 'paid');
  } else {
    cols = [];
    cols.push({ id: 'drag', l: '' });
    cols.push({ id: 'num', l: '#' });
    cols.push({ id: 'code', l: 'Номер закупки' });
    cols.push({ id: 'firm', l: 'Фирма' });
    cols.push({ id: 'org', l: 'Организация' });
    cols.push({ id: 'item', l: 'Предмет закупки' });
    cols.push({ id: 'qty', l: 'Кол-во' });
    if (canSeePrice) { cols.push({ id: 'price', l: 'Цена' }); cols.push({ id: 'total', l: 'Сумма' }); }
    cols.push({ id: 'location', l: 'Место поставки' });
    cols.push({ id: 'deadline', l: 'Срок поставки' });
    cols.push({ id: 'contract_number', l: '№ договора' });
    cols.push({ id: 'signed_date', l: 'Дата подп.' });
    cols.push({ id: 'delivery_date', l: 'Срок исп.' });
    if (roleKey) cols.push({ id: 'status', l: 'Статус' });
  }

  let h = `<table><thead><tr>`;
  cols.forEach(c => { h += `<th style="${c.w ? `min-width:${c.w}px` : ''}">${c.l}<div class="rzr"></div></th>`; });
  h += `</tr></thead><tbody>`;

  if (!rows.length) {
    h += `<tr><td colspan="${cols.length}" class="td"><div class="nodata">Нет данных</div></td></tr>`;
  }

  // Custom fields data
  const customFields = ls('kd_custom_fields', {});

  rows.forEach((r, idx) => {
    const expanded = expandedRows.has(r.id);
    const costs = getCosts(r.id);
    const costTot = costs.reduce((s, c) => s + Number(c.amount), 0);
    const isHidden = !r.is_visible;
    const isPaid = r.payment_status === 'paid';
    const roleRestrict = rowRoleVisibility[r.id] || [];
    const hasRestrict = roleRestrict.length > 0;

    h += `<tr data-id="${r.id}"
      draggable="${isAdmin ? 'true' : 'false'}"
      ondragstart="onDS(event,'${r.id}')"
      ondragend="onDE()"
      ondragover="onDO(event,'${r.id}')"
      ondrop="onDrop(event,'${r.id}')"
      style="${isHidden && isAdmin ? 'opacity:0.5' : ''}">`;

    cols.forEach(c => {
      if (c.id === 'drag') {
        h += `<td class="td" style="padding:9px 6px;width:24px">${isAdmin ? `<span class="dh" title="Перетащить">⠿</span>` : ''}</td>`;
      } else if (c.id === 'num') {
        h += `<td class="td" style="width:30px;color:#64748b;font-size:11px">${idx + 1}</td>`;
      } else if (c.id === 'name' || c.id === 'org') {
        h += `<td class="td" style="max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500">${escOr(r.org)}</td>`;
      } else if (c.id === 'code') {
        h += `<td class="td" style="font-family:monospace;font-size:11px;white-space:nowrap">${escOr(r.code)}</td>`;
      } else if (c.id === 'firm') {
        h += `<td class="td"><span class="bdg bfirm">${escOr(r.firm)}</span></td>`;
      } else if (c.id === 'region') {
        const loc = r.location || '';
        let region = '—';
        if (loc.includes('Астана')) region = 'Астана';
        else if (loc.includes('Алматы')) region = 'Алматы';
        else if (loc.includes('Костанай')) region = 'Костанай';
        else if (loc.includes('Павлодар')) region = 'Павлодар';
        else if (loc.includes('Уральск') || loc.includes('ЗКО')) region = 'ЗКО';
        else if (loc.includes('Атырау')) region = 'Атырау';
        else if (loc) region = loc.substring(0,12);
        h += `<td class="td" style="font-size:11px">${region}</td>`;
      } else if (c.id === 'item') {
        const hasSub = costs.length > 0 || getFiles(r.id).length > 0;
        h += `<td class="td" style="max-width:200px">
          <div style="display:flex;align-items:flex-start;gap:5px">
            ${hasSub ? `<button onclick="toggleExp('${r.id}')" style="background:none;border:none;cursor:pointer;color:var(--accent);font-size:12px;padding:0;flex-shrink:0;margin-top:1px">${expanded ? '▾' : '▸'}</button>` : '<span style="width:16px;flex-shrink:0"></span>'}
            <div>
              <div style="font-size:12px">${escOr(r.item)}</div>
              ${r.comment ? `<div style="font-size:10px;color:#64748b;margin-top:2px">${esc(r.comment)}</div>` : ''}
              ${costs.length > 0 && canSeePrice ? `<div style="font-size:10px;color:#00ff88;margin-top:1px">Затрат: ${fmtN(costTot)}</div>` : ''}
            </div>
          </div>
        </td>`;
      } else if (c.id === 'qty') {
        h += `<td class="td" style="text-align:right;white-space:nowrap">${r.qty ? r.qty.toLocaleString('ru') : '—'}</td>`;
      } else if (c.id === 'price') {
        h += `<td class="td" style="text-align:right;white-space:nowrap;font-size:12px">${r.price ? fmtN(r.price) : '—'}</td>`;
      } else if (c.id === 'cost_price') {
        if (canCostPrice()) {
          const margin = r.cost_price && r.price ? ((r.price - r.cost_price) / r.price * 100).toFixed(1) : null;
          h += `<td class="td" style="text-align:right;white-space:nowrap;font-size:12px">
            ${r.cost_price ? `<span style="color:#ffa502;font-weight:600">${fmtN(r.cost_price)}</span>` : '—'}
            ${margin ? `<div style="font-size:10px;color:#00ff88">М: ${margin}%</div>` : ''}
          </td>`;
        } else {
          h += `<td class="td" style="text-align:center;color:#64748b;font-size:12px">—</td>`;
        }
      } else if (c.id === 'total') {
        h += `<td class="td" style="text-align:right;white-space:nowrap;font-weight:700;color:var(--accent)">${r.total ? fmtN(r.total) : '—'}</td>`;
      } else if (c.id === 'location') {
        h += `<td class="td" style="max-width:120px;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escOr(r.location)}</td>`;
      } else if (c.id === 'date' || c.id === 'signed_date') {
        h += `<td class="td" style="font-size:11px;white-space:nowrap">${escOr(r.signed_date)}</td>`;
      } else if (c.id === 'deadline' || c.id === 'delivery_date') {
        h += `<td class="td" style="font-size:11px;white-space:nowrap">${r.deadline || r.delivery_date || '—'}</td>`;
      } else if (c.id === 'contract_number') {
        h += `<td class="td" style="font-size:11px;font-family:monospace">${escOr(r.contract_number)}</td>`;
      } else if (c.id === 'paid' || c.id === 'payment') {
        h += `<td class="td" onclick="${isAdmin ? `togglePay('${r.id}')` : ''}" style="${isAdmin ? 'cursor:pointer' : ''}">
          <span class="bdg ${isPaid ? 'bg' : 'br'}">${isPaid ? '✅ Оплачен' : '❌ Не опл.'}</span>
        </td>`;
      } else if (c.id === 'comments') {
        h += `<td class="td" style="vertical-align:top;min-width:160px"><div data-cmtcell="${r.id}">${commentCellHtml(r.id)}</div></td>`;
      } else if (c.id === 'status') {
        if (isAdmin) {
          h += `<td class="td" style="min-width:120px"><div data-src="${r.id}">${statusCellHtml(r.id)}</div></td>`;
        } else if (roleKey) {
          h += `<td class="td">${statusSel(r.id, roleKey)}</td>`;
        } else {
          h += `<td class="td">—</td>`;
        }
      } else if (c.id === 'actions') {
        h += `<td class="td" style="white-space:nowrap">
          <button onclick="startEdit('${r.id}')" style="background:none;border:none;cursor:pointer;color:#64748b;font-size:13px;padding:2px 4px" title="Редактировать">✏️</button>
          ${canDel ? `<button onclick="deleteRow('${r.id}')" style="background:none;border:none;cursor:pointer;color:#ff4757;font-size:13px;padding:2px 4px" title="Удалить">🗑️</button>` : ''}
          ${isAdmin ? `<button onclick="toggleVisibility('${r.id}')" style="background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px" title="${hasRestrict ? 'Ограничен: '+roleRestrict.map(k=>ROLES[k]?.l||k).join(', ') : 'Видимость по ролям'}">${hasRestrict ? '🔒' : (isHidden ? '👁️‍🗨️' : '👁️')}</button>` : ''}
        </td>`;
      } else if (c.id.startsWith('custom_') || c.custom) {
        // Custom column - read from kd_custom_fields
        const val = (customFields[r.id] || {})[c.id] || '';
        h += `<td class="td" style="font-size:12px;min-width:${c.w||100}px">${isAdmin ? `<span onclick="editCustomField('${r.id}','${c.id}',this)" style="cursor:pointer;display:block;min-height:20px" title="Нажмите для редактирования">${val || '<span style=color:#64748b>—</span>'}</span>` : (val || '—')}</td>`;
      } else {
        // Generic fallback for any other col id matching a contract field
        const val = r[c.id];
        h += `<td class="td" style="font-size:12px">${val !== undefined && val !== null && val !== '' ? val : '—'}</td>`;
      }
    });

    h += `</tr>`;

    // Expanded panel
    if (expanded) {
      h += `<tr class="xrow"><td colspan="${cols.length}" style="padding:0">
        <div class="xpanel"><div class="xinner">
          ${canCosts() ? costsHtml(r, true) : (costs.length ? costsHtml(r, false) : '')}
          ${filesHtml(r.id, canManage(), canDelFile())}
          ${r.phone ? `<div style="font-size:11px;color:#64748b;margin-top:8px">📞 ${esc(r.phone)}</div>` : ''}
        </div></div>
      </td></tr>`;
    }
  });

  h += `</tbody></table>`;
  return h;
}

function editCustomField(contractId, fieldId, el) {
  const customFields = ls('kd_custom_fields', {});
  const cur = (customFields[contractId] || {})[fieldId] || '';
  const val = prompt('Значение:', cur);
  if (val === null) return;
  if (!customFields[contractId]) customFields[contractId] = {};
  customFields[contractId][fieldId] = val.trim();
  lsw('kd_custom_fields', customFields);
  el.innerHTML = val.trim() || '<span style="color:#64748b">—</span>';
}

// ===== WAREHOUSE PAGE (Feature 3) =====
function renderWarehousePage(m) {
  if (!m) m = document.getElementById('main');
  warehouseMaterials = ls('kd_warehouse_materials', []);
  warehouseGoods = ls('kd_warehouse_goods', []);
  const isAdmin = currentRole === 'admin';

  const matStatusOpts = [
    { v: 'available', l: 'В наличии', cls: 'bg' },
    { v: 'low',       l: 'Заканчивается', cls: 'by' },
    { v: 'none',      l: 'Нет', cls: 'br' }
  ];
  const goodStatusOpts = [
    { v: 'stored',    l: 'На складе', cls: 'bb' },
    { v: 'shipped',   l: 'Отправлен', cls: 'bg' },
    { v: 'written',   l: 'Списан', cls: 'bfirm' }
  ];

  function tblHtml(items, statusOpts, storageKey, title, icon) {
    let h = `<div style="margin-bottom:20px">
      <div style="font-size:12px;font-weight:700;color:#00d4ff;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">${icon} ${title}</div>
      <table style="width:100%;border-collapse:collapse;background:#0d1a2e;border:1px solid rgba(0,212,255,0.15);border-radius:8px;overflow:hidden">
        <thead><tr style="background:#050d1a">
          <th style="padding:8px 10px;font-size:10px;font-weight:600;color:#00d4ff;text-align:left;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid rgba(0,212,255,0.15)">Наименование</th>
          <th style="padding:8px 10px;font-size:10px;font-weight:600;color:#00d4ff;text-align:right;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid rgba(0,212,255,0.15)">Кол-во</th>
          <th style="padding:8px 10px;font-size:10px;font-weight:600;color:#00d4ff;text-align:left;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid rgba(0,212,255,0.15)">Ед.изм</th>
          <th style="padding:8px 10px;font-size:10px;font-weight:600;color:#00d4ff;text-align:left;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid rgba(0,212,255,0.15)">Статус</th>
          <th style="padding:8px 10px;font-size:10px;font-weight:600;color:#00d4ff;text-align:left;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid rgba(0,212,255,0.15)">Дата</th>
          <th style="padding:8px 10px;font-size:10px;font-weight:600;color:#00d4ff;text-align:left;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid rgba(0,212,255,0.15)">Комментарий</th>
          ${isAdmin ? `<th style="padding:8px 10px;font-size:10px;font-weight:600;color:#00d4ff;text-align:center;border-bottom:1px solid rgba(0,212,255,0.15)">Действия</th>` : ''}
        </tr></thead>
        <tbody>`;
    if (!items.length) {
      h += `<tr><td colspan="${isAdmin?7:6}" style="padding:16px;text-align:center;color:#64748b;font-size:12px">Нет записей</td></tr>`;
    }
    items.forEach((item, i) => {
      const so = statusOpts.find(o => o.v === item.status) || statusOpts[0];
      h += `<tr style="border-bottom:1px solid rgba(0,212,255,0.06)">
        <td style="padding:9px 10px;font-size:12px;color:#e2e8f0">${item.name || '—'}</td>
        <td style="padding:9px 10px;font-size:12px;text-align:right;color:#00d4ff;font-weight:600">${item.qty || '—'}</td>
        <td style="padding:9px 10px;font-size:12px;color:#94a3b8">${item.unit || '—'}</td>
        <td style="padding:9px 10px">
          ${isAdmin ? `<select onchange="setWarehouseStatus('${storageKey}',${i},this.value)" style="border:1px solid rgba(0,212,255,0.2);border-radius:10px;font-size:11px;padding:2px 6px;background:#0a1628;color:#e2e8f0;cursor:pointer;outline:none">
            ${statusOpts.map(o => `<option value="${o.v}"${o.v===item.status?' selected':''}>${o.l}</option>`).join('')}
          </select>` : `<span class="bdg ${so.cls}">${so.l}</span>`}
        </td>
        <td style="padding:9px 10px;font-size:11px;color:#64748b">${item.date || '—'}</td>
        <td style="padding:9px 10px;font-size:11px;color:#94a3b8">${item.comment || '—'}</td>
        ${isAdmin ? `<td style="padding:9px 10px;text-align:center">
          <button onclick="deleteWarehouseItem('${storageKey}',${i})" style="background:none;border:none;cursor:pointer;color:#ff4757;font-size:13px" title="Удалить">🗑️</button>
        </td>` : ''}
      </tr>`;
    });
    h += `</tbody></table>`;
    if (isAdmin) {
      h += `<button onclick="openAddWarehouseItem('${storageKey}')" style="margin-top:8px;padding:6px 14px;background:rgba(0,212,255,0.08);border:1px dashed rgba(0,212,255,0.3);border-radius:6px;color:#00d4ff;font-size:12px;cursor:pointer">+ Добавить</button>`;
    }
    h += `</div>`;
    return h;
  }

  m.style.cssText = 'display:flex;flex-direction:column;height:100%;overflow:hidden;min-height:0';
  m.innerHTML = `
    <div style="padding:10px 14px 6px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
      <div style="font-size:16px;font-weight:700;color:#00d4ff;font-family:Orbitron,sans-serif">🏪 Склад</div>
      ${isAdmin ? `<button onclick="openWarehouseAccess()" style="padding:5px 12px;background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.25);border-radius:6px;color:#00d4ff;font-size:12px;cursor:pointer">👁 Доступ</button>` : ''}
    </div>
    <div style="flex:1;overflow:auto;padding:0 14px 14px">
      ${tblHtml(warehouseMaterials, matStatusOpts, 'kd_warehouse_materials', 'Материалы', '📦')}
      ${tblHtml(warehouseGoods, goodStatusOpts, 'kd_warehouse_goods', 'Готовая продукция', '🏷️')}
    </div>`;
}

function setWarehouseStatus(storageKey, idx, val) {
  const items = ls(storageKey, []);
  if (items[idx]) { items[idx].status = val; lsw(storageKey, items); }
  if (storageKey === 'kd_warehouse_materials') warehouseMaterials = items;
  else warehouseGoods = items;
}

function deleteWarehouseItem(storageKey, idx) {
  if (!confirm('Удалить запись?')) return;
  const items = ls(storageKey, []);
  items.splice(idx, 1);
  lsw(storageKey, items);
  if (storageKey === 'kd_warehouse_materials') warehouseMaterials = items;
  else warehouseGoods = items;
  renderWarehousePage();
}

function openAddWarehouseItem(storageKey) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center';
  const isMat = storageKey === 'kd_warehouse_materials';
  const statusOpts = isMat
    ? [{v:'available',l:'В наличии'},{v:'low',l:'Заканчивается'},{v:'none',l:'Нет'}]
    : [{v:'stored',l:'На складе'},{v:'shipped',l:'Отправлен'},{v:'written',l:'Списан'}];
  overlay.innerHTML = `<div style="background:#0d1a2e;border:1px solid rgba(0,212,255,0.3);border-radius:12px;width:420px;max-width:95vw;padding:24px">
    <h3 style="color:#00d4ff;font-size:14px;margin-bottom:16px">+ Добавить запись</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div><label style="font-size:10px;color:#64748b;display:block;margin-bottom:3px">Наименование</label><input id="wh-name" type="text" style="width:100%;padding:7px 9px;background:#0a1628;border:1px solid rgba(0,212,255,0.25);border-radius:6px;color:#e2e8f0;font-size:12px;outline:none"></div>
      <div><label style="font-size:10px;color:#64748b;display:block;margin-bottom:3px">Кол-во</label><input id="wh-qty" type="text" style="width:100%;padding:7px 9px;background:#0a1628;border:1px solid rgba(0,212,255,0.25);border-radius:6px;color:#e2e8f0;font-size:12px;outline:none"></div>
      <div><label style="font-size:10px;color:#64748b;display:block;margin-bottom:3px">Ед.изм</label><input id="wh-unit" type="text" placeholder="шт, м, кг" style="width:100%;padding:7px 9px;background:#0a1628;border:1px solid rgba(0,212,255,0.25);border-radius:6px;color:#e2e8f0;font-size:12px;outline:none"></div>
      <div><label style="font-size:10px;color:#64748b;display:block;margin-bottom:3px">Статус</label><select id="wh-status" style="width:100%;padding:7px 9px;background:#0a1628;border:1px solid rgba(0,212,255,0.25);border-radius:6px;color:#e2e8f0;font-size:12px;outline:none">${statusOpts.map(o=>`<option value="${o.v}">${o.l}</option>`).join('')}</select></div>

function saveWorkshopItem(idx, btn) {
  const newItem = {
    contract_id: document.getElementById('ws-contract')?.value || '',
    item: document.getElementById('ws-item')?.value?.trim() || '',
    qty: document.getElementById('ws-qty')?.value?.trim() || '',
    stage: document.getElementById('ws-stage')?.value || WORKSHOP_STAGES[0],
    executor: document.getElementById('ws-exec')?.value?.trim() || '',
    status: document.getElementById('ws-status')?.value || 'В работе',
    start_date: document.getElementById('ws-start')?.value || '',
    ready_date: document.getElementById('ws-ready')?.value || '',
  };
  if (idx !== undefined && idx !== null && !isNaN(idx)) {
    workshopItems[idx] = newItem;
  } else {
    workshopItems.push(newItem);
  }
  lsw('kd_workshop_items', workshopItems);
  btn.closest('[style*=fixed]').remove();
  renderWorkshopPage();
  showToast('Сохранено');
}

function deleteWorkshopItem(idx) {
  if (!confirm('Удалить из цеха?')) return;
  workshopItems.splice(idx, 1);
  lsw('kd_workshop_items', workshopItems);
  renderWorkshopPage();
}

function saveWorkshopAccess(btn) {
  const newAccess = Object.keys(ROLES).filter(k => document.getElementById('wsacc-'+k)?.checked);

// ===== NAVIGATION UPDATE =====
function updateNavVisibility() {
  const tabs = document.getElementById('navtabs');
  if (!tabs) return;
  if (currentRole === 'admin') {
    tabs.style.display = 'flex';
    tabs.innerHTML = PAGES.admin.map(p =>
      `<div class="ntab${currentPage===p.id?' active':''}" data-page="${p.id}" onclick="goPage('${p.id}')">${p.l}</div>`
    ).join('');
  } else {
    const whAccess = ls('kd_warehouse_access', ['admin']);
    const wsAccess = ls('kd_workshop_access', ['admin']);
    const hasWh = whAccess.includes(currentRole);
    const hasWs = wsAccess.includes(currentRole);
    tabs.style.display = (hasWh || hasWs) ? 'flex' : 'none';
    let tabHtml = `<div class="ntab${currentPage==='contracts'?' active':''}" data-page="contracts" onclick="goPage('contracts')">📋 Договора</div>`;
    if (hasWh) tabHtml += `<div class="ntab${currentPage==='warehouse'?' active':''}" data-page="warehouse" onclick="goPage('warehouse')">🏪 Склад</div>`;
    if (hasWs) tabHtml += `<div class="ntab${currentPage==='workshop'?' active':''}" data-page="workshop" onclick="goPage('workshop')">🧵 Швейный цех</div>`;
    tabs.innerHTML = tabHtml;
  }
}
