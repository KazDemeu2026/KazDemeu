<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;margin:0;padding:0;font-family:'Inter',sans-serif;font-size:13px;color:#111827;background:#f1f5f9}

/* LOGIN */
#loginWrap{position:fixed;inset:0;background:linear-gradient(135deg,#0f1923,#1a2d45,#0f3460);display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:24px}

.llogo{text-align:center;margin-bottom:24px}

.llogo h1{font-size:20px;font-weight:700}
.llogo p{color:#6b7280;font-size:12px;margin-top:3px}
.rlist{display:flex;flex-direction:column;gap:7px;margin-bottom:18px}
.ritem{display:flex;align-items:center;gap:10px;padding:11px 13px;border:2px solid #e5e7eb;border-radius:8px;cursor:pointer;transition:all .15s}

.rico{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}

.lbtn{width:100%;padding:11px;background:#1a56db;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.lbtn:disabled{background:#9ca3af;cursor:not-allowed}

/* APP */
#app{position:fixed;top:0;left:0;right:0;bottom:0;display:none;flex-direction:column;overflow:hidden}

/* TOPBAR */
.topbar{height:46px;background:#0f1923;color:#fff;display:flex;align-items:center;padding:0 14px;gap:10px}
.t-logo{font-size:14px;font-weight:700;white-space:nowrap}
.t-badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
.t-right{margin-left:auto;display:flex;align-items:center;gap:6px}

/* NAV TABS - admin only */

.main{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column}

/* STATS */

.sc{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:10px 14px;min-width:130px;flex-shrink:0}
.sl{font-size:10px;color:#6b7280;margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.sv{font-size:18px;font-weight:700}
.ss{font-size:10px;color:#9ca3af;margin-top:1px}

.sbox input:focus{border-color:#1a56db}

.fsel{padding:6px 10px;border:1px solid #e5e7eb;border-radius:7px;font-size:12px;font-family:inherit;background:#fff;outline:none}
.btn{padding:6px 13px;border-radius:7px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}

/* TABLE WRAP - KEY: flex:1 + overflow:hidden, inner scroll */
.twrap{flex:1;min-height:0;overflow:hidden;margin:0 14px 10px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;display:flex;flex-direction:column}
.thead-bar{padding:7px 12px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:8px;flex-shrink:0}
.th-title{font-size:13px;font-weight:600}

.tscroll{flex:1;min-height:0;overflow:auto}

.dh:hover{color:#9ca3af}
tr.dragging{opacity:.4}
tr.drag-over{outline:2px solid #1a56db}

/* COL RESIZE */
th{position:relative}
.rzr{position:absolute;right:0;top:0;width:4px;height:100%;cursor:col-resize;background:transparent}
.rzr:hover{background:#1a56db;opacity:.3}

/* EXPAND */
tr.xrow>td{border-bottom:none}
.xpanel{background:#f8faff;border-bottom:2px solid #dbeafe}
.xinner{padding:12px 14px 12px 44px}
.xtitle{font-size:10px;font-weight:700;color:#1a56db;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}

/* COSTS */
.clist{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.crow{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #dbeafe;border-radius:6px;padding:7px 10px}
.cnum{font-size:11px;color:#9ca3af;min-width:14px}
.csum{font-size:13px;font-weight:700;color:#1a56db;min-width:110px}
.ccom{font-size:12px;flex:1}
.cdate{font-size:10px;color:#9ca3af}
.cdel{background:none;border:none;cursor:pointer;color:#dc2626;opacity:.5;font-size:13px}
.cdel:hover{opacity:1}

.acost{display:flex;flex-direction:column;gap:6px;margin-top:8px;padding:9px 11px;background:#fff;border:1.5px dashed #bfdbfe;border-radius:6px}
.acrow{display:flex;gap:7px}
.acost input,.acost textarea{padding:6px 9px;border:1px solid #dbeafe;border-radius:6px;font-size:12px;font-family:inherit;outline:none}
.acost input:focus,.acost textarea:focus{border-color:#1a56db}
.acs{width:120px}
.acc{flex:1;resize:none;height:32px}

/* FILES */
.flist{display:flex;flex-direction:column;gap:5px;margin-bottom:7px}
.frow{display:flex;align-items:center;gap:7px;background:#fff;border:1px solid #dbeafe;border-radius:6px;padding:6px 9px}
.fic{font-size:16px}
.fin{flex:1;min-width:0}
.fnm{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fmeta{font-size:10px;color:#9ca3af}
.fdl{padding:2px 8px;font-size:11px;background:#eff6ff;color:#1a56db;border:1px solid #bfdbfe;border-radius:5px;cursor:pointer}

.cform-title{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:7px}
.ffield label{display:block;font-size:10px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.ffield input{width:100%;padding:6px 9px;border:1px solid #e5e7eb;border-radius:6px;font-size:12px;font-family:inherit;outline:none}
.ffield input:focus{border-color:#1a56db}
.factions{display:flex;gap:7px;margin-top:10px}

/* ANALYTICS */
.apage{flex:1;overflow:auto;padding:10px 14px;min-height:0}
.agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-top:4px}
.acard{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:14px}
.actitle{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.brow{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.blabel{font-size:11px;color:#6b7280;width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btrack{flex:1;background:#f3f4f6;border-radius:3px;height:7px}
.bfill{height:100%;border-radius:3px;background:#1a56db}
.bval{font-size:11px;font-weight:600;min-width:70px;text-align:right}

/* FINANCE */
.fpage{flex:1;overflow:auto;padding:10px 14px;min-height:0}
.ftable{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;border:1px solid #e5e7eb}
.ftable th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;background:#f9fafb;border-bottom:1px solid #e5e7eb}
.ftable td{padding:9px 12px;border-bottom:1px solid #f3f4f6;font-size:12px}
.ftable tr:last-child td{border-bottom:none}
.pp{color:#15803d;font-weight:700}
.pn{color:#dc2626;font-weight:700}

/* SCROLL NAV */
.snav{position:fixed;right:10px;bottom:14px;display:flex;flex-direction:column;gap:4px;z-index:50}
.snav button{width:30px;height:30px;background:#0f1923;border:none;color:#fff;border-radius:50%;cursor:pointer;font-size:12px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.snav button:hover{background:#1a56db}

.nodata{text-align:center;padding:40px;color:#9ca3af}





.exp-btn{padding:4px 9px;border-radius:5px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;cursor:pointer;font-size:11px;font-family:inherit}
.exp-btn:hover{background:rgba(255,255,255,.16)}

.adm-empty-cell:hover .adm-plus-btn{opacity:1!important}

.adm-data-cell .adm-del-cell-btn{
  position:absolute;top:2px;right:2px;
  opacity:0;background:#fee2e2;border:none;border-radius:3px;
  padding:1px 4px;color:#dc2626;cursor:pointer;font-size:10px;
  transition:opacity .15s;z-index:2;
}
.adm-data-cell:hover .adm-del-cell-btn{opacity:1}

/* Column drag in adm table */
.adm-th-drag{cursor:grab}
.adm-th-drag:active{cursor:grabbing}
.adm-th-drag-over{border-left:3px solid #1a56db!important}

.adm-col-resizer{position:absolute;right:0;top:0;width:5px;height:100%;cursor:col-resize;background:transparent}
.adm-col-resizer:hover{background:rgba(255,255,255,.3)}

#admScroll::-webkit-scrollbar,
.fpage::-webkit-scrollbar,
.apage::-webkit-scrollbar { width:8px; height:8px; }

/* GROK CHAT - улучшенный */

  position:fixed;right:0;top:0;bottom:0;width:420px;
  background:#fff;border-left:2px solid #1a56db;
  display:none;flex-direction:column;z-index:1000;
  box-shadow:-8px 0 30px rgba(0,0,0,.15);
}
#grokPanel.open{display:flex}
.grok-header{
  padding:16px 20px;background:#0f172a;color:#fff;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.grok-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}

'use strict';

// Firebase initialized above
const db = window._db || null;

let fbConnected = false;

// Check connection
if(db) db.ref('.info/connected').on('value', snap => {
  fbConnected = snap.val();
  const btn = document.getElementById('fbStatus');
  if(btn) btn.textContent = fbConnected ? '🟢 Онлайн' : '🔴 Офлайн';
});

// ─── FIREBASE SAVE/LOAD ───────────────────────────────────────────────────────
function fbSave(key, data){
  if(!db||!fbConnected) return;
  db.ref('kazdameu/'+key).set(data);
}

function fbLoad(key, callback){
  db.ref('kazdameu/'+key).on('value', snap=>{
    const val = snap.val();
    if(val !== null) callback(val);
  });
}

function fbSaveAll(){
  if(!db||!fbConnected) return;
  db.ref('kazdameu').set({
    extra: extra,
    deleted: [...deleted],
    costs: costsDB,
    files: filesDB,
    status: statusDB,
    admCats: admCats,
    admRows: admRows,
    updated: new Date().toISOString()
  });
}

function fbLoadAll(callback){
  if(!db) return;
  db.ref('kazdameu').once('value', snap=>{
    const val = snap.val();
    if(val) callback(val);
  });
}

// Listen for real-time changes from other users
function fbListenChanges(){
  if(!db) return;
  db.ref('kazdameu').on('value', snap=>{
    const val = snap.val();
    if(!val) return;
    // Update local data
    if(val.extra) { extra = val.extra; lsw('kd2_extra', extra); }
    if(val.deleted) { deleted = new Set(val.deleted); lsw('kd2_del', [...deleted]); }
    if(val.costs) { costsDB = val.costs; lsw('kd2_costs', costsDB); }
    if(val.status) { statusDB = val.status; lsw('kd2_status', statusDB); }
    if(val.admCats) { admCats = val.admCats; lsw('kd2_admcats', admCats); }
    if(val.admRows) { admRows = val.admRows; lsw('kd2_admrows', admRows); }
    // Re-render if app is open
    if(role && document.getElementById('app').style.display !== 'none'){
      const m = document.getElementById('main');
      if(page==='c') renderContracts(m);
      else if(page==='adm') renderAdminExpenses(m);
      else if(page==='f') renderFinance(m);
      else if(page==='a') renderAnalytics(m);
    }
  });
}

// ─── COL RESIZE ───────────────────────────────────────────────────────────────
let colDragSrc=null;

function initResizers(){
  const ths=[...document.querySelectorAll('.tscroll th')];
  ths.forEach((th,i)=>{
    // resize handle
    if(!th.querySelector('.rzr')){
      const k=role+i;if(colW[k])th.style.minWidth=colW[k]+'px';
      const rz=document.createElement('div');rz.className='rzr';
      rz.addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();resizing={th,k,sx:e.clientX,sw:th.getBoundingClientRect().width};document.body.style.cursor='col-resize';document.body.style.userSelect='none';});
      th.appendChild(rz);
    }
    if(role==='admin'){
      // hide button
      if(!th.querySelector('.hide-col-btn')){
        const hb=document.createElement('button');
        hb.className='hide-col-btn';hb.title='Скрыть';hb.textContent='×';
        hb.style.cssText='position:absolute;top:1px;right:5px;width:14px;height:14px;font-size:9px;background:rgba(220,38,38,.15);border:none;border-radius:3px;cursor:pointer;color:#dc2626;display:none;align-items:center;justify-content:center;line-height:1;padding:0';
        hb.onclick=e=>{e.stopPropagation();toggleCol(i);};
        th.addEventListener('mouseenter',()=>hb.style.display='flex');
        th.addEventListener('mouseleave',()=>hb.style.display='none');
        th.appendChild(hb);
      }
      // column drag
      th.draggable=true;
      th.style.cursor='grab';
      th.ondragstart=e=>{colDragSrc=i;th.style.opacity='.4';e.dataTransfer.effectAllowed='move';};
      th.ondragend=e=>{th.style.opacity='';document.querySelectorAll('th.col-drag-over').forEach(el=>el.classList.remove('col-drag-over'));};
      th.ondragover=e=>{e.preventDefault();if(colDragSrc!==i){ths.forEach(t=>t.classList.remove('col-drag-over'));th.classList.add('col-drag-over');}};
      th.ondrop=e=>{
        e.preventDefault();
        if(colDragSrc===null||colDragSrc===i)return;
        th.classList.remove('col-drag-over');
        // reorder columns in DOM
        const tbl=document.querySelector('.tscroll table');
        if(!tbl)return;
        [...tbl.querySelectorAll('tr')].forEach(row=>{
          const cells=[...row.children];
          if(cells.length<=Math.max(colDragSrc,i))return;
          const moved=cells[colDragSrc];
          if(colDragSrc<i) row.insertBefore(moved,cells[i].nextSibling);
          else row.insertBefore(moved,cells[i]);
        });
        colDragSrc=null;
        initResizers();
      };
    }
  });
  applyHiddenCols();
}
document.addEventListener('mousemove',e=>{if(!resizing)return;const w=Math.max(40,resizing.sw+(e.clientX-resizing.sx));resizing.th.style.minWidth=w+'px';});
document.addEventListener('mouseup',()=>{if(!resizing)return;colW[resizing.k]=resizing.th.getBoundingClientRect().width;lsw('kd2_cw',colW);resizing.th.style.cursor='';document.body.style.cursor='';document.body.style.userSelect='';resizing=null;});

function admShowInput(catId, rowIdx, btn){
  const td = btn.closest('td');
  td.innerHTML = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:3px 4px">
    <input placeholder="Сумма" type="number" id="adm-s-${catId}-${rowIdx}" style="width:100%;padding:4px 6px;border:1px solid #bfdbfe;border-radius:4px;font-size:12px;font-family:inherit;outline:none;text-align:right" onkeydown="if(event.key==='Enter')admAddCell('${catId}',${rowIdx})" autofocus>
    <input placeholder="Комментарий" type="text" id="adm-c-${catId}-${rowIdx}" style="width:100%;padding:4px 6px;border:1px solid #bfdbfe;border-radius:4px;font-size:12px;font-family:inherit;outline:none" onkeydown="if(event.key==='Enter')admAddCell('${catId}',${rowIdx})">
  </div>`;
  document.getElementById('adm-s-'+catId+'-'+rowIdx)?.focus();
}

function admAddCell(catId, rowIdx){
  const sEl = document.getElementById('adm-s-'+catId+'-'+rowIdx);
  const cEl = document.getElementById('adm-c-'+catId+'-'+rowIdx);
  const s = parseFloat((sEl?.value||'').replace(/\s/g,'').replace(',','.'));
  const c = cEl?.value?.trim()||'';
  if(!s||s<=0){ if(sEl) sEl.style.borderColor='red'; return; }
  if(!admRows[catId]) admRows[catId]=[];
  // insert at specific row index
  while(admRows[catId].length <= rowIdx) admRows[catId].push(null);
  admRows[catId][rowIdx] = {sum:s, com:c, date:new Date().toLocaleDateString('ru-RU')};
  // remove nulls
  admRows[catId] = admRows[catId].filter(r=>r!==null);
  saveAdmRows();
  goPage('adm');
}

function admEditCell(catId, rowIdx, field){
  const r = (admRows[catId]||[])[rowIdx];
  if(!r) return;
  const cur = field==='sum' ? r.sum : r.com;
  const val = prompt(field==='sum'?'Новая сумма:':'Новый комментарий:', cur||'');
  if(val===null) return;
  if(field==='sum'){
    const n = parseFloat(val.replace(/\s/g,'').replace(',','.'));
    if(!n||n<=0) return;
    admRows[catId][rowIdx].sum = n;
  } else {
    admRows[catId][rowIdx].com = val.trim();
  }
  saveAdmRows();
  goPage('adm');
}

function admDelEntireRow(rowIdx){
  if(!confirm('Удалить строку '+( rowIdx+1)+'?')) return;
  admCats.forEach(cat=>{
    if(admRows[cat.id] && admRows[cat.id][rowIdx]!==undefined){
      admRows[cat.id].splice(rowIdx,1);
    }
  });
  saveAdmRows();
  goPage('adm');
}


function renderAnalytics(m){
  const data=allData();

  data.forEach(r=>{byFirm[r.firm]=(byFirm[r.firm]||0)+r.totalNum;});
  const fs=Object.entries(byFirm).sort((a,b)=>b[1]-a[1]);

  // Топ организаций

  data.forEach(r=>{byOrg[r.org]=(byOrg[r.org]||0)+r.totalNum;});
  const os=Object.entries(byOrg).sort((a,b)=>b[1]-a[1]).slice(0,8);

  // Статусы выполнения
  const sc={start:0,plan:0,finish:0,none:0};
  data.forEach(r=>{const v=getS(r.id,'manager')||getS(r.id,'constructor')||getS(r.id,'logist')||'';if(v==='start')sc.start++;else if(v==='plan')sc.plan++;else if(v==='finish')sc.finish++;else sc.none++;});

  // По регионам (из места поставки)
  const byRegion={};
  data.forEach(r=>{
    const loc=r.location||'';
    let region='Не указан';
    if(loc.includes('Астана')||loc.includes('астана')) region='Астана';
    else if(loc.includes('Алматы')||loc.includes('алматы')) region='Алматы';
    else if(loc.includes('Костанай')) region='Костанайская обл.';
    else if(loc.includes('Павлодар')) region='Павлодарская обл.';
    else if(loc.includes('Уральск')||loc.includes('ЗКО')) region='ЗКО';
    else if(loc.includes('Атырау')) region='Атырау';
    else if(loc.includes('Талдыкорган')||loc.includes('Алматинской')) region='Алматинская обл.';
    else if(loc.includes('Туркестан')) region='Туркестанская обл.';
    else if(loc.includes('Акмолин')||loc.includes('Щучинск')) region='Акмолинская обл.';
    else if(loc) region='Другие';
    byRegion[region]=(byRegion[region]||0)+1;
  });
  const regions=Object.entries(byRegion).sort((a,b)=>b[1]-a[1]);
  const mr=regions[0]?.[1]||1;

  m.innerHTML=`
    <div class="stats">

      <div class="sc"><div class="sl">Общая сумма</div><div class="sv" style="font-size:13px">${fmtN(tot)}</div></div>

      <div class="sc"><div class="sl">Не оплачено</div><div class="sv" style="color:#dc2626;font-size:13px">${fmtN(tot-ptot)}</div></div>
      <div class="sc"><div class="sl">Средний чек</div><div class="sv" style="font-size:13px">${fmtN(avgDeal)}</div></div>
    </div>
    <div class="apage"><div class="agrid">

      <div class="acard"><div class="actitle">📦 По фирмам (сумма)</div>
        ${fs.map(([k,v])=>`<div class="brow"><div class="blabel" title="${k}">${k}</div><div class="btrack"><div class="bfill" style="width:${Math.round(v/mf*100)}%"></div></div><div class="bval">${fmtN(v)}</div></div>`).join('')}
      </div>

      <div class="acard"><div class="actitle">🏢 Топ организаций по сумме</div>
        ${os.map(([k,v])=>`<div class="brow"><div class="blabel" title="${k}">${k}</div><div class="btrack"><div class="bfill" style="width:${Math.round(v/mo*100)}%;background:#7c3aed"></div></div><div class="bval">${fmtN(v)}</div></div>`).join('')}

// ─── EXPORT / IMPORT ──────────────────────────────────────────────────────────
function exportData(){
  const data = {
    extra: extra,
    deleted: [...deleted],
    costs: costsDB,
    files: filesDB,
    status: statusDB,
    exported: new Date().toLocaleString('ru-RU')
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'КазДемеу_данные_' + new Date().toLocaleDateString('ru-RU').replace(/\./g,'-') + '.json';
  a.click();
}

function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const r = new FileReader();
  r.onload = function(ev){
    try{
      const d = JSON.parse(ev.target.result);
      if(d.extra) { extra = d.extra; lsw('kd2_extra', extra); }
      if(d.deleted) { deleted = new Set(d.deleted); lsw('kd2_del', [...deleted]); }
      if(d.costs) { costsDB = d.costs; lsw('kd2_costs', costsDB); }
      if(d.files) { filesDB = d.files; lsw('kd2_files', filesDB); }
      if(d.status) { statusDB = d.status; lsw('kd2_status', statusDB); }
      alert('✅ Данные загружены успешно!');
      goPage(page);
    } catch(err) {
      alert('❌ Ошибка: неверный формат файла');
    }
  };
  r.readAsText(file);
  e.target.value = '';
}

// ─── HIDE COLUMNS (admin only) ───────────────────────────────────────────────
let hiddenCols = new Set(ls('kd2_hidden',[]));
function saveHidden(){lsw('kd2_hidden',[...hiddenCols]);}
function toggleCol(idx){
  if(hiddenCols.has(idx)) hiddenCols.delete(idx);
  else hiddenCols.add(idx);
  saveHidden();
  applyHiddenCols();
}
function applyHiddenCols(){
  document.querySelectorAll('table').forEach(t=>{
    const ths=[...t.querySelectorAll('thead tr th')];
    ths.forEach((th,i)=>{
      const hide=hiddenCols.has(i);
      th.style.display=hide?'none':'';
      t.querySelectorAll('tbody tr').forEach(tr=>{
        const td=tr.children[i];
        if(td) td.style.display=hide?'none':'';
      });
    });
  });
}

// Shift+wheel = horizontal scroll in adm table

// ADM column drag
let admDragSrcId = null;
function admColDragStart(e, catId){
  admDragSrcId = catId;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.style.opacity = '.5';
}
function admColDragOver(e, catId){
  e.preventDefault();
  document.querySelectorAll('.adm-th-drag').forEach(el=>el.classList.remove('adm-th-drag-over'));
  if(catId !== admDragSrcId) e.currentTarget.classList.add('adm-th-drag-over');
}
function admColDrop(e, targetId){
  e.preventDefault();
  document.querySelectorAll('.adm-th-drag').forEach(el=>el.classList.remove('adm-th-drag-over'));
  if(!admDragSrcId || admDragSrcId === targetId) return;
  const srcIdx = admCats.findIndex(c=>c.id===admDragSrcId);
  const tgtIdx = admCats.findIndex(c=>c.id===targetId);
  if(srcIdx<0||tgtIdx<0) return;
  const [moved] = admCats.splice(srcIdx,1);
  admCats.splice(tgtIdx,0,moved);
  saveAdmCats();
  admDragSrcId = null;
  goPage('adm');
}
function admColDragEnd(){
  admDragSrcId = null;
  document.querySelectorAll('.adm-th-drag').forEach(el=>{el.style.opacity='';el.classList.remove('adm-th-drag-over');});
}

// ADM column resize
let admResizing = null;
const ADM_WIDTHS_KEY = 'kd2_adm_widths';
let admColWidths = JSON.parse(localStorage.getItem(ADM_WIDTHS_KEY)||'{}');

function admResizerStart(e, catId){
  e.preventDefault(); e.stopPropagation();
  const th = e.target.closest('th');
  admResizing = {catId, th, startX: e.clientX, startW: th.getBoundingClientRect().width};
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
}
document.addEventListener('mousemove', e=>{
  if(!admResizing) return;
  const w = Math.max(140, admResizing.startW + (e.clientX - admResizing.startX));
  admResizing.th.style.minWidth = w+'px';
  admResizing.th.style.width = w+'px';
  // apply to data cells in same column
  const idx = admCats.findIndex(c=>c.id===admResizing.catId);
  document.querySelectorAll('#admTable tbody tr').forEach(tr=>{
    const td = tr.children[idx+1]; // +1 for # column
    if(td){ td.style.minWidth=w+'px'; td.style.width=w+'px'; }
  });
});
document.addEventListener('mouseup', e=>{
  if(!admResizing) return;
  admColWidths[admResizing.catId] = admResizing.th.getBoundingClientRect().width;
  localStorage.setItem(ADM_WIDTHS_KEY, JSON.stringify(admColWidths));
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  admResizing = null;
});

function admAddCat(){
  const name = prompt('Название категории (например: Транспорт):');
  if(!name||!name.trim()) return;
  const id = 'cat-'+Date.now();
  admCats.push({id, name:name.trim()});
  saveAdmCats();
  goPage('adm');
}
function admDelCat(id){
  if(!confirm('Удалить категорию и все её записи?')) return;
  admCats = admCats.filter(c=>c.id!==id);
  delete admRows[id];
  saveAdmCats(); saveAdmRows();
  goPage('adm');
}
function admEditCat(id){
  const cat = admCats.find(c=>c.id===id);
  if(!cat) return;
  const name = prompt('Новое название:', cat.name);
  if(!name||!name.trim()) return;
  cat.name = name.trim();
  saveAdmCats();
  goPage('adm');
}
function admAddRow(catId){
  const sumEl = document.getElementById('adm-sum-'+catId);
  const comEl = document.getElementById('adm-com-'+catId);
  const s = parseFloat((sumEl.value||'').replace(/\s/g,'').replace(',','.'));
  const c = (comEl.value||'').trim();
  if(!s||s<=0){ sumEl.style.borderColor='red'; return; }
  if(!admRows[catId]) admRows[catId]=[];
  admRows[catId].push({sum:s, com:c, date:new Date().toLocaleDateString('ru-RU')});
  saveAdmRows();
  sumEl.value=''; comEl.value='';
  goPage('adm');
}
function admDelRow(catId, idx){
  admRows[catId].splice(idx,1);
  saveAdmRows();
  goPage('adm');
}

function getDataContext(){
  const data = allData();
  const paid = data.filter(r=>r.costs==='опл');
  const unpaid = data.filter(r=>r.costs!=='опл');
  const totalSum = data.reduce((s,r)=>s+r.totalNum,0);
  const paidSum = paid.reduce((s,r)=>s+r.totalNum,0);
  const costsTotal = data.reduce((s,r)=>s+getCosts(r.id).reduce((ss,c)=>ss+c.sum,0),0);
  const contractList = data.slice(0,20).map(r=>'- '+r.id+': '+r.org+', '+r.item+', '+r.qty+' шт, '+r.total+', '+(r.costs==='опл'?'ОПЛАЧЕНО':'НЕ ОПЛАЧЕНО')+', '+r.location).join('\n');
  const admList = admCats.map(c=>{const t=(admRows[c.id]||[]).reduce((s,r)=>s+r.sum,0);return '- '+c.name+': '+fmtN(t);}).join('\n');
  return 'Данные системы КазДемеу:\n'+
    'Всего договоров: '+data.length+'\n'+
    'Оплачено: '+paid.length+' на сумму '+fmtN(paidSum)+'\n'+
    'Не оплачено: '+unpaid.length+' на сумму '+fmtN(totalSum-paidSum)+'\n'+
    'Общая сумма: '+fmtN(totalSum)+'\n'+
    'Затраты: '+fmtN(costsTotal)+'\n'+
    'Чистая прибыль: '+fmtN(paidSum-costsTotal)+'\n\n'+
    'Список договоров (первые 20):\n'+contractList+
    (data.length>20?'\n...и ещё '+(data.length-20)+' договоров':'')+
    '\n\nАдминистративные расходы:\n'+admList;
}

async function grokSend(){
  const inp = document.getElementById('grokInput');
  const msg = (inp.value||'').trim();
  if(!msg) return;
  inp.value = '';
  await grokAsk(msg);
}

async function grokAsk(question){
  const msgs = document.getElementById('grokMessages');
  const btn = document.getElementById('grokSendBtn');

  // Add user message
  msgs.innerHTML += `<div class="grok-msg user">${question}</div>`;
  msgs.innerHTML += `<div class="grok-msg ai loading" id="grokLoading">⏳ Думаю...</div>`;
  msgs.scrollTop = msgs.scrollHeight;
  btn.disabled = true;

  grokHistory.push({role:'user', content: question});

  try{
    const systemPrompt = `Ты AI-ассистент системы управления договорами КазДемеу. 
Отвечай кратко и по делу на русском языке.
Вот актуальные данные системы:

${getDataContext()}`;

    const resp = await fetch('https://api.x.ai/v1/chat/completions',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+GROK_KEY
      },
      body: JSON.stringify({
        model: 'grok-3-mini',
        messages:[
          {role:'system', content: systemPrompt},
          ...grokHistory.slice(-10)
        ],
        max_tokens: 1200,
        temperature: 0.7
      })
    });

    const data = await resp.json();
    const answer = data.choices?.[0]?.message?.content || 'Ошибка получения ответа';
    
    grokHistory.push({role:'assistant', content: answer});

    const formatted = answer
      .split('\n').join('<br>')
      .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
      .replace(/\*(.*?)\*/g, '<i>$1</i>');
    document.getElementById('grokLoading').outerHTML = 
      `<div class="grok-msg ai">${formatted}</div>`;
  } catch(e){
    document.getElementById('grokLoading').outerHTML = 
      `<div class="grok-msg ai" style="color:#dc2626">❌ Ошибка: ${e.message}</div>`;
  }

  msgs.scrollTop = msgs.scrollHeight;
  btn.disabled = false;
}
